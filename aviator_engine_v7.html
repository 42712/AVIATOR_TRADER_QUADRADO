<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Engine v7 - LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06090f;--bg2:#0a0f1a;--bg3:#0e1522;--bg4:#121d2e;
  --brd:#18273d;--brd2:#203555;
  --txt:#b8d0ec;--txt2:#4a6e94;--txt3:#1e3a58;
  --up:#a855f7;--dn:#06b6d4;--pk:#f43f5e;--gn:#22c55e;--am:#f59e0b;
  --font:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);font-size:11px;color:var(--txt)}
.root{display:flex;flex-direction:column;height:100vh}
.main{display:flex;flex:1;overflow:hidden;min-height:0}

.topbar{height:38px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;flex-shrink:0;user-select:none}
.tb-logo{padding:0 14px;font-size:13px;font-weight:700;color:#fff;border-right:1px solid var(--brd);height:100%;display:flex;align-items:center;gap:8px}
.tb-dot{width:8px;height:8px;border-radius:50%;background:var(--gn);animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--gn)}50%{box-shadow:0 0 14px var(--gn)}}
.tb-mid{flex:1;display:flex;align-items:center;gap:3px;padding:0 10px}
.tb-right{display:flex;align-items:center;gap:4px;padding:0 10px;border-left:1px solid var(--brd)}
.btn{padding:2px 9px;border-radius:4px;border:1px solid var(--brd2);background:var(--bg3);color:var(--txt2);font-size:9px;font-family:var(--font);cursor:pointer;height:22px;display:flex;align-items:center;gap:3px;transition:all .15s}
.btn:hover{border-color:var(--txt2);color:var(--txt)}
.btn.g{border-color:#166534;background:rgba(34,197,94,.1);color:var(--gn)}
.ws-pill{display:flex;align-items:center;gap:4px;font-size:9px;padding:0 8px;border-left:1px solid var(--brd)}
.ws-pill.ok{color:var(--gn)}.ws-pill.err{color:var(--pk)}
.wsd{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.chart-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:default}
#cv{display:block;position:absolute;top:0;left:0}
#pov{position:absolute;inset:0;z-index:19;display:none;cursor:grabbing}
.xbar{height:26px;background:var(--bg2);border-top:1px solid var(--brd);display:flex;align-items:center;padding:0 8px;gap:8px;font-size:8px;flex-shrink:0}
.xslider{flex:1;height:4px;-webkit-appearance:none;background:var(--brd2);border-radius:2px;cursor:pointer}
.xslider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gn);cursor:pointer}

.data-sb{width:170px;background:var(--bg2);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sbh{padding:4px 10px;font-size:7px;color:var(--txt3);border-bottom:1px solid var(--brd);text-transform:uppercase}
.kv-block{padding:4px 10px 6px;border-bottom:1px solid var(--brd)}
.kv{display:flex;justify-content:space-between;padding:2px 0}
.kk{font-size:8px;color:var(--txt2)}.kvv{font-size:9px;font-weight:500;color:var(--txt)}
.log-area{flex:1;overflow-y:auto}
.log-row{display:flex;align-items:center;gap:3px;padding:2px 8px;border-bottom:1px solid #070d15;font-size:9px;cursor:pointer}
.log-row:hover{background:var(--bg3)}
.ldot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.lt{color:var(--txt3);min-width:28px;font-size:8px}.lv{font-weight:500}
.ltag{font-size:7px;padding:1px 3px;border-radius:2px;margin-left:auto;background:rgba(34,197,94,.15);color:var(--gn)}

.tooltip{position:absolute;background:#080f1c;border:1px solid var(--brd2);border-radius:5px;padding:6px 10px;display:none;z-index:60;min-width:100px}
.tt-v{font-size:14px;font-weight:700}.tt-s{font-size:8px;color:var(--txt2)}
.alert{position:absolute;top:10px;left:50%;transform:translateX(-50%);padding:6px 22px;border-radius:20px;font-size:12px;font-weight:700;pointer-events:none;z-index:50;white-space:nowrap;opacity:0;transition:opacity .3s}
.alert.show{opacity:1}
.flash{position:absolute;inset:0;border:2px solid var(--gn);opacity:0;pointer-events:none;transition:opacity .12s;z-index:45}
.flash.on{opacity:1}
#btnBack{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.35);border:1.5px solid var(--gn);border-radius:20px;padding:7px 22px;font-size:11px;font-weight:700;color:var(--gn);cursor:pointer;display:none;z-index:60}
#btnBack.show{display:block}
</style>
</head>
<body>
<div class="root">

<div class="topbar">
  <div class="tb-logo"><div class="tb-dot"></div>AVIATOR v7 - LIVE</div>
  <div class="tb-mid">
    <button class="btn" onclick="zoomIn()">+</button>
    <button class="btn" onclick="zoomOut()">&#8722;</button>
    <button class="btn" onclick="resetView()">&#8635;</button>
    <div class="ws-pill ok" id="wsStatus"><span class="wsd"></span><span id="wsLabel">ONLINE</span></div>
  </div>
  <div class="tb-right">
    <button class="btn g" onclick="syncNow()">&#8635; SINCRONIZAR</button>
  </div>
</div>

<div class="main">
<div class="chart-col">
  <div class="canvas-wrap" id="cwrap">
    <canvas id="cv"></canvas>
    <div id="pov"></div>
    <div class="flash" id="flash"></div>
    <div class="alert" id="alertBox"></div>
    <div class="tooltip" id="ttBox"><div class="tt-v" id="ttV"></div><div class="tt-s" id="ttS"></div></div>
    <button id="btnBack" onclick="voltarPresente()">&#9654;&#9654; VOLTAR AO PRESENTE</button>
  </div>
  <div class="xbar">
    <span id="xL">—</span><span id="xM">—</span><span id="xR">—</span>
    <input type="range" class="xslider" id="xslider" min="5" max="200" value="50" oninput="CFG.showN=parseInt(this.value);draw()">
    <span id="xNow" style="color:var(--gn);font-size:13px;font-weight:700">—</span>
    <span id="xZoom" style="color:var(--txt3)">50v</span>
  </div>
</div>

<div class="data-sb">
  <div class="sbh">ÚLTIMO VALOR</div>
  <div class="kv-block">
    <div class="kv"><span class="kk">Atual</span><span class="kvv" id="sCot" style="color:var(--gn)">—</span></div>
    <div class="kv"><span class="kk">Servidor</span><span class="kvv" id="oSrc">Render ✅</span></div>
    <div class="kv"><span class="kk">Total velas</span><span class="kvv" id="sTot">0</span></div>
    <div class="kv"><span class="kk">Painel</span><span class="kvv" id="painelInfo">1</span></div>
  </div>
  <div class="sbh">LOG RECENTE</div>
  <div class="log-area" id="logArea"></div>
</div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO - SEU SERVIDOR
// ═══════════════════════════════════════════════════════════════════
const SERVIDOR_URL = "https://aviator-trader-quadrado.onrender.com";
const PAINEL = 1;

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
const cwrap = document.getElementById('cwrap');

let pts = [];
let pollingInterval = null;
let ultimoTimestamp = 0;

const CFG = { showN: 50 };

let viewOffset = 0;
let zoomLevel = 1.0;
let vertOffset = 0;
let scaleW = 60;
let isPanning = false;
let panX0 = 0, panOff0 = 0;
let _mx = 0, _my = 0;

// ═══════════════════════════════════════════════════════════════════
// FUNÇÕES
// ═══════════════════════════════════════════════════════════════════
function addLog(vela) {
  const t = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const v = parseFloat(vela.multiplicador);
  const rodada = vela.rodada || '';
  const cor = v >= 10 ? '#f472b6' : v >= 2 ? '#a855f7' : '#06b6d4';
  const area = document.getElementById('logArea');
  const row = document.createElement('div');
  row.className = 'log-row';
  row.innerHTML = `<div class="ldot" style="background:${cor}"></div>
                   <span class="lt">${t}</span>
                   <span class="lv" style="color:${cor}">${v.toFixed(2)}x</span>
                   <span class="ltag">${rodada ? '#'+rodada : '—'}</span>`;
  area.insertBefore(row, area.firstChild);
  while(area.children.length > 50) area.removeChild(area.lastChild);
}

function atualizarUI() {
  if (pts.length === 0) return;
  const ultima = pts[pts.length - 1];
  document.getElementById('sCot').textContent = ultima.val.toFixed(2) + 'x';
  document.getElementById('sTot').textContent = pts.length;
  const cor = ultima.val >= 10 ? '#f472b6' : ultima.val >= 2 ? '#a855f7' : '#06b6d4';
  document.getElementById('sCot').style.color = cor;
}

function showAlert(msg, color, dur = 3000) {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.style.cssText = `background:${color}22;border:1px solid ${color};color:${color}`;
  el.className = 'alert show';
  setTimeout(() => el.className = 'alert', dur);
}

function triggerFlash() {
  const f = document.getElementById('flash');
  f.className = 'flash on';
  setTimeout(() => f.className = 'flash', 500);
}

// ═══════════════════════════════════════════════════════════════════
// BUSCAR VELAS DO SERVIDOR
// ═══════════════════════════════════════════════════════════════════
async function buscarVelasCompletas() {
  try {
    const url = `${SERVIDOR_URL}/api/velas?painel=${PAINEL}&limit=500`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.velas && Array.isArray(data.velas)) {
      const novasVelas = [];
      ultimoTimestamp = 0;
      
      for (const vela of data.velas) {
        // Ignora o teste de conexão
        if (vela.rodada === 'TESTE_CONEXAO') continue;
        
        const mult = parseFloat(vela.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          let ts = vela.timestamp ? new Date(vela.timestamp) : new Date();
          if (isNaN(ts.getTime())) ts = new Date();
          novasVelas.push({
            val: mult,
            time: ts,
            rodada: vela.rodada,
            ts_recebido: vela.ts_recebido
          });
          if (vela.ts_recebido && vela.ts_recebido > ultimoTimestamp) {
            ultimoTimestamp = vela.ts_recebido;
          }
        }
      }
      
      novasVelas.sort((a,b) => a.time - b.time);
      
      // Verifica se tem velas novas
      if (novasVelas.length !== pts.length) {
        pts = novasVelas;
        atualizarUI();
        scheduleDraw();
        
        // Adiciona últimas 5 ao log
        const ultimas5 = pts.slice(-5).reverse();
        document.getElementById('logArea').innerHTML = '';
        ultimas5.forEach(v => {
          const row = document.createElement('div');
          row.className = 'log-row';
          const t = v.time.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
          const cor = v.val >= 10 ? '#f472b6' : v.val >= 2 ? '#a855f7' : '#06b6d4';
          row.innerHTML = `<div class="ldot" style="background:${cor}"></div>
                           <span class="lt">${t}</span>
                           <span class="lv" style="color:${cor}">${v.val.toFixed(2)}x</span>
                           <span class="ltag">${v.rodada ? '#'+v.rodada.substring(0,12) : '—'}</span>`;
          document.getElementById('logArea').appendChild(row);
        });
        
        if (pts.length > 0) {
          showAlert(`✅ ${pts.length} velas carregadas`, '#22c55e', 1500);
        }
      }
    }
  } catch (err) {
    console.error('Erro:', err);
  }
}

async function buscarNovasVelas() {
  try {
    let url = `${SERVIDOR_URL}/api/velas?painel=${PAINEL}&limit=20`;
    if (ultimoTimestamp > 0) {
      url += `&desde=${ultimoTimestamp}`;
    }
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.velas && Array.isArray(data.velas) && data.velas.length > 0) {
      let novas = 0;
      for (const vela of data.velas) {
        if (vela.rodada === 'TESTE_CONEXAO') continue;
        
        const mult = parseFloat(vela.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          const jaExiste = pts.some(p => p.rodada === vela.rodada);
          if (!jaExiste && vela.rodada !== 'TESTE_CONEXAO') {
            let ts = vela.timestamp ? new Date(vela.timestamp) : new Date();
            if (isNaN(ts.getTime())) ts = new Date();
            pts.push({
              val: mult,
              time: ts,
              rodada: vela.rodada
            });
            novas++;
          }
          if (vela.ts_recebido && vela.ts_recebido > ultimoTimestamp) {
            ultimoTimestamp = vela.ts_recebido;
          }
        }
      }
      
      if (novas > 0) {
        pts.sort((a,b) => a.time - b.time);
        if (pts.length > 1000) pts = pts.slice(-1000);
        atualizarUI();
        scheduleDraw();
        
        // Adiciona as novas ao topo do log
        const novasVelas = pts.slice(-novas).reverse();
        for (const v of novasVelas) {
          const row = document.createElement('div');
          row.className = 'log-row';
          const t = v.time.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
          const cor = v.val >= 10 ? '#f472b6' : v.val >= 2 ? '#a855f7' : '#06b6d4';
          row.innerHTML = `<div class="ldot" style="background:${cor}"></div>
                           <span class="lt">${t}</span>
                           <span class="lv" style="color:${cor}">${v.val.toFixed(2)}x</span>
                           <span class="ltag">${v.rodada ? '#'+v.rodada.substring(0,12) : '—'}</span>`;
          const logArea = document.getElementById('logArea');
          logArea.insertBefore(row, logArea.firstChild);
        }
        
        while(document.getElementById('logArea').children.length > 30) {
          document.getElementById('logArea').removeChild(document.getElementById('logArea').lastChild);
        }
        
        showAlert(`📈 +${novas} nova(s) vela(s)!`, '#22c55e', 1500);
        triggerFlash();
      }
    }
  } catch (err) {
    console.error('Polling error:', err);
  }
}

async function syncNow() {
  showAlert('🔄 Sincronizando...', '#60a5fa', 1000);
  await buscarVelasCompletas();
}

function scheduleDraw() {
  requestAnimationFrame(() => draw());
}

// ═══════════════════════════════════════════════════════════════════
// GRÁFICO
// ═══════════════════════════════════════════════════════════════════
function getVisN() {
  return Math.max(5, Math.round(CFG.showN / zoomLevel));
}

function getViewSub() {
  const n = getVisN();
  const end = Math.max(n, pts.length - viewOffset);
  const start = Math.max(0, end - n);
  return pts.slice(start, end);
}

function getScale(sub, W, H) {
  scaleW = Math.max(44, scaleW);
  const vals = sub.map(p => p.val);
  if (vals.length === 0) return { sx: () => 0, sy: () => 0, minV: 0, maxV: 1 };
  const minV = Math.max(0.85, Math.min(...vals) * 0.95);
  const maxV = Math.max(...vals) * 1.08;
  const cW = W - 12 - scaleW;
  const cH = H - 44 - 20;
  const n = sub.length;
  const logMin = Math.log10(minV);
  const logMax = Math.log10(maxV);
  const vsh = (vertOffset / cH) * (logMax - logMin);
  return {
    sx: i => 12 + i * ((cW - 40) / (n - 1 || 1)),
    sy: v => 44 + cH * (1 - (Math.log10(Math.max(v, minV)) - logMin + vsh) / (logMax - logMin || 1)),
    minV, maxV
  };
}

function col(v) {
  return v >= 10 ? '#f472b6' : v >= 2 ? '#a855f7' : '#06b6d4';
}

function draw() {
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;
  ctx.clearRect(0, 0, W, H);
  
  const sub = getViewSub();
  if (sub.length < 2) return;
  
  const { sx, sy, minV, maxV } = getScale(sub, W, H);
  
  // Grid
  ctx.font = '8px JetBrains Mono, monospace';
  [1, 2, 3, 5, 10, 20, 50].filter(v => v >= minV && v <= maxV * 1.05).forEach(v => {
    const py = sy(v);
    ctx.strokeStyle = v >= 10 ? 'rgba(244,114,182,0.07)' : v >= 2 ? 'rgba(168,85,247,0.06)' : '#0c1b2e';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(12, py);
    ctx.lineTo(W - scaleW, py);
    ctx.stroke();
    ctx.fillStyle = v >= 10 ? '#be185d' : v >= 2 ? '#7e22ce' : '#1e3a58';
    ctx.fillText(v + 'x', W - scaleW + 4, py + 3);
  });
  
  // Linhas de zona
  const zonas = [
    { val: 1.0, cor: 'rgba(6,182,212,0.6)', dash: [6, 3] },
    { val: 2.0, cor: 'rgba(168,85,247,0.5)', dash: [6, 3] },
    { val: 10.0, cor: 'rgba(244,114,182,0.6)', dash: [8, 3] }
  ];
  zonas.forEach(z => {
    if (z.val >= minV && z.val <= maxV) {
      const py = sy(z.val);
      ctx.strokeStyle = z.cor;
      ctx.lineWidth = 1.5;
      ctx.setLineDash(z.dash);
      ctx.beginPath();
      ctx.moveTo(12, py);
      ctx.lineTo(W - scaleW, py);
      ctx.stroke();
    }
  });
  ctx.setLineDash([]);
  
  // Área e linha
  const yBase = sy(minV);
  for (let i = 1; i < sub.length; i++) {
    const p0 = sub[i-1], p1 = sub[i];
    const x0 = sx(i-1), y0 = sy(p0.val);
    const x1 = sx(i), y1 = sy(p1.val);
    const vm = Math.max(p0.val, p1.val);
    const cpx1 = x0 + (x1 - x0) * 0.42;
    const cpx2 = x0 + (x1 - x0) * 0.58;
    
    ctx.beginPath();
    ctx.moveTo(x0, yBase);
    ctx.lineTo(x0, y0);
    ctx.bezierCurveTo(cpx1, y0, cpx2, y1, x1, y1);
    ctx.lineTo(x1, yBase);
    ctx.closePath();
    ctx.fillStyle = col(vm) + '20';
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.bezierCurveTo(cpx1, y0, cpx2, y1, x1, y1);
    ctx.strokeStyle = col(vm);
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  
  // Bolinhas
  sub.forEach((p, i) => {
    const x = sx(i), y = sy(p.val);
    const r = p.val >= 10 ? 6 : p.val >= 2 ? 4.5 : 3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = col(p.val);
    ctx.fill();
    ctx.strokeStyle = p.val >= 10 ? '#be185d' : p.val >= 2 ? '#7e22ce' : '#0891b2';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });
  
  // Labels X
  if (sub.length > 0) {
    document.getElementById('xL').textContent = sub[0].time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('xM').textContent = sub[Math.floor(sub.length/2)].time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('xR').textContent = sub[sub.length-1].time.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }
  
  document.getElementById('xZoom').textContent = sub.length + 'v';
  document.getElementById('xslider').value = CFG.showN;
}

// ═══════════════════════════════════════════════════════════════════
// CONTROLES
// ═══════════════════════════════════════════════════════════════════
function zoomIn() { zoomLevel = Math.min(10, zoomLevel * 1.25); draw(); }
function zoomOut() { zoomLevel = Math.max(0.1, zoomLevel / 1.25); draw(); }
function resetView() { zoomLevel = 1.0; viewOffset = 0; vertOffset = 0; draw(); }
function voltarPresente() { viewOffset = 0; document.getElementById('btnBack').classList.remove('show'); draw(); }

// ═══════════════════════════════════════════════════════════════════
// MOUSE
// ═══════════════════════════════════════════════════════════════════
function getPos(e) {
  const r = cwrap.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

cwrap.addEventListener('mousedown', e => {
  const pos = getPos(e);
  isPanning = true;
  panX0 = pos.x;
  panOff0 = viewOffset;
  document.getElementById('pov').style.display = 'block';
});

cwrap.addEventListener('mousemove', e => {
  const pos = getPos(e);
  _mx = pos.x; _my = pos.y;
  
  if (isPanning) {
    const sub = getViewSub();
    if (sub.length >= 2) {
      const step = (canvas.width - 12 - scaleW) / (sub.length - 1 || 1);
      const shift = Math.round((panX0 - pos.x) / step);
      viewOffset = Math.max(0, Math.min(pts.length - getVisN(), panOff0 + shift));
      document.getElementById('btnBack').classList.toggle('show', viewOffset > 2);
      draw();
    }
  }
  
  // Tooltip
  if (!isPanning) {
    const sub = getViewSub();
    if (sub.length >= 2) {
      const { sx, sy } = getScale(sub, canvas.width, canvas.height);
      const step = (canvas.width - 12 - scaleW) / (sub.length - 1 || 1);
      const idx = Math.round((pos.x - 12) / step);
      const tt = document.getElementById('ttBox');
      if (idx >= 0 && idx < sub.length && pos.x < canvas.width - scaleW) {
        const p = sub[idx];
        document.getElementById('ttV').textContent = p.val.toFixed(2) + 'x';
        document.getElementById('ttV').style.color = col(p.val);
        document.getElementById('ttS').textContent = p.time.toLocaleTimeString('pt-BR');
        tt.style.display = 'block';
        tt.style.left = Math.min(pos.x + 12, canvas.width - scaleW - 15) + 'px';
        tt.style.top = Math.max(5, pos.y - 42) + 'px';
      } else {
        tt.style.display = 'none';
      }
    }
  }
});

cwrap.addEventListener('mouseup', () => {
  document.getElementById('pov').style.display = 'none';
  isPanning = false;
});

cwrap.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.shiftKey) {
    vertOffset += e.deltaY > 0 ? -10 : 10;
  } else {
    e.deltaY < 0 ? zoomIn() : zoomOut();
  }
  draw();
}, { passive: false });

// ═══════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = cwrap.clientWidth, h = cwrap.clientHeight;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
new ResizeObserver(resize).observe(cwrap);

// ═══════════════════════════════════════════════════════════════════
// RELÓGIO
// ═══════════════════════════════════════════════════════════════════
setInterval(() => {
  document.getElementById('xNow').textContent = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second:'2-digit' });
}, 500);

// ═══════════════════════════════════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════════════════
resize();

// Primeira carga
setTimeout(async () => {
  await buscarVelasCompletas();
  
  // Inicia polling a cada 2 segundos
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(() => buscarNovasVelas(), 2000);
  
  showAlert('🟢 Conectado ao servidor! Velas em tempo real...', '#22c55e', 3000);
}, 500);
</script>
</body>
</html>

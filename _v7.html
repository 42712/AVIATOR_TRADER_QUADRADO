<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aviator v7 - IA Completa</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080f;--bg2:#0a0f1a;--bg3:#0e1522;--bg4:#121d2e;
  --brd:#18273d;--brd2:#203555;
  --txt:#b8d0ec;--txt2:#4a6e94;--txt3:#1e3a58;
  --roxo:#a855f7;--azul:#06b6d4;--rosa:#f472b6;--verde:#22c55e;--amarelo:#f59e0b;
  --font:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);font-size:11px;color:var(--txt)}
.root{display:flex;flex-direction:column;height:100vh;width:100vw}
.main{display:flex;flex:1;overflow:hidden;min-height:0}

.topbar{height:38px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;flex-shrink:0;padding:0 12px;gap:8px}
.tb-logo{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tb-mid{display:flex;align-items:center;gap:4px;flex:1}
.tb-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.btn{padding:3px 10px;border-radius:5px;border:1px solid var(--brd2);background:var(--bg3);color:var(--txt2);font-size:9px;font-family:var(--font);cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--txt2);color:var(--txt)}
.btn.g{border-color:#166534;background:rgba(34,197,94,.1);color:var(--verde)}
.btn.b{border-color:#1e3a5f;background:rgba(96,165,250,.08);color:#60a5fa}
.btn.r{border-color:#9f1239;background:rgba(244,63,94,.08);color:var(--rosa)}
.ws-pill{display:flex;align-items:center;gap:4px;font-size:9px;padding:0 6px}
.ws-pill.ok{color:var(--verde)}.ws-pill.err{color:var(--rosa)}
.wsd{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.chart-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);min-height:0}
#cv{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#pov{position:absolute;inset:0;z-index:19;display:none;cursor:grabbing}

.xbar{height:26px;background:var(--bg2);border-top:1px solid var(--brd);display:flex;align-items:center;padding:0 8px;gap:8px;font-size:8px;flex-shrink:0}
.xslider{flex:1;height:4px;-webkit-appearance:none;background:var(--brd2);border-radius:2px}
.xslider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--verde);cursor:pointer}

.data-sb{width:170px;background:var(--bg2);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sbh{padding:4px 10px;font-size:7px;color:var(--txt3);border-bottom:1px solid var(--brd);text-transform:uppercase}
.kv-block{padding:4px 10px 6px;border-bottom:1px solid var(--brd)}
.kv{display:flex;justify-content:space-between;padding:2px 0}
.kk{font-size:8px;color:var(--txt2)}.kvv{font-size:9px;font-weight:500;color:var(--txt)}
.border-status{background:var(--bg3);margin:8px;padding:8px;border-radius:6px;text-align:center;transition:all 0.3s}
.border-status span{font-size:10px;font-weight:700}
.border-roxo{background:rgba(168,85,247,0.2);border-left:3px solid var(--roxo);color:var(--roxo)}
.border-rosa{background:rgba(244,114,182,0.2);border-left:3px solid var(--rosa);color:var(--rosa)}
.border-azul{background:rgba(6,182,212,0.2);border-left:3px solid var(--azul);color:var(--azul)}
.pisca{animation: piscaAnim 0.5s ease-in-out 3}
@keyframes piscaAnim{
  0%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(1.02)}
  100%{opacity:1;transform:scale(1)}
}
.highlight-block{background:rgba(244,114,182,0.1);border-left:2px solid var(--rosa);margin:5px 8px;padding:6px 8px;border-radius:4px}
.highlight-title{font-size:7px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.5px}
.highlight-value{font-size:11px;font-weight:700;color:var(--rosa)}
.highlight-time{font-size:7px;color:var(--txt2);margin-top:2px}
.pattern-area{background:var(--bg3);margin:8px;padding:8px;border-radius:6px;border-left:2px solid var(--amarelo)}
.pattern-title{font-size:8px;color:var(--amarelo)}
.pattern-value{font-size:9px;font-weight:700;color:var(--verde)}
.log-area{flex:1;overflow-y:auto}
.log-row{display:flex;align-items:center;gap:5px;padding:3px 8px;border-bottom:1px solid #070d15;font-size:9px;cursor:pointer}
.log-row:hover{background:var(--bg3)}
.log-row.selecionado{background:rgba(34,197,94,0.2);border-left:3px solid var(--verde)}
.ldot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.lt{color:var(--txt2);min-width:55px;font-size:8px}
.lv{font-weight:700;min-width:45px}
.ltag{font-size:7px;padding:2px 6px;border-radius:3px;margin-left:auto}
.ltag.rosa{background:rgba(244,114,182,.2);color:#f472b6}
.ltag.roxa{background:rgba(168,85,247,.2);color:#a855f7}
.ltag.azul{background:rgba(6,182,212,.2);color:#06b6d4}
.ltag.sinal{background:rgba(34,197,94,.3);color:#22c55e}

.tooltip{position:absolute;background:#080f1c;border:1px solid var(--brd2);border-radius:6px;padding:8px 12px;display:none;z-index:60;min-width:100px}
.tt-v{font-size:14px;font-weight:700}.tt-s{font-size:8px;color:var(--txt2)}
.alert{position:absolute;top:50px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;z-index:50;opacity:0;transition:opacity .3s;background:#000}
.alert.show{opacity:1}
.flash{position:absolute;inset:0;border:2px solid var(--verde);opacity:0;pointer-events:none;transition:opacity .12s;z-index:45}
.flash.on{opacity:1}
#btnBack{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.9);border:none;border-radius:30px;padding:8px 20px;font-size:11px;font-weight:700;color:#000;cursor:pointer;display:none;z-index:60}
#btnBack.show{display:block}

.modal-bg{position:fixed;inset:0;background:rgba(5,8,13,.95);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-bg.open{display:flex}
.modal{background:var(--bg4);border:1px solid var(--brd2);border-radius:12px;padding:20px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.m-title{font-size:13px;font-weight:700;color:#fff;display:flex;justify-content:space-between;margin-bottom:12px}
.m-x{cursor:pointer;color:var(--txt2)}
.mm-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--brd);flex-wrap:wrap}
.mm-label{font-size:9px;color:var(--txt2);width:60px}
.mm-num{width:50px;padding:4px;background:var(--bg3);border:1px solid var(--brd2);border-radius:4px;color:var(--txt);font-size:9px}
.mm-color{width:30px;height:24px;border:none;border-radius:4px}
.mm-op{width:45px;padding:4px;background:var(--bg3);border:1px solid var(--brd2);border-radius:4px;color:var(--txt);font-size:9px}
.mm-sel{padding:4px;background:var(--bg3);border:1px solid var(--brd2);border-radius:4px;color:var(--txt);font-size:9px}
.mm-toggle{width:36px;height:18px;border-radius:9px;background:var(--brd2);cursor:pointer;position:relative}
.mm-toggle.on{background:var(--verde)}
.mm-toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s}
.mm-toggle.on::after{left:20px}
.m-btns{display:flex;gap:8px;margin-top:12px}
.mbtn{padding:6px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;flex:1;text-align:center}
.mb-g{background:rgba(34,197,94,.12);border-color:#166534;color:var(--verde)}
.mb-r{background:rgba(244,63,94,.08);border-color:#9f1239;color:var(--rosa)}
.mb-c{background:var(--bg3);border-color:var(--brd);color:var(--txt3)}
</style>
</head>
<body>
<div class="root">

<div class="topbar">
  <div class="tb-logo"><span style="font-size:16px">✈️</span> AVIATOR</div>
  <div class="tb-mid">
    <button class="btn" onclick="zoomIn()">+</button>
    <button class="btn" onclick="zoomOut()">-</button>
    <button class="btn" onclick="resetView()">↺</button>
    <button class="btn" id="maBtn" onclick="toggleMA()">MM</button>
    <button class="btn b" onclick="openCfgMM()">⚙ MM</button>
  </div>
  <div class="tb-right">
    <button class="btn" onclick="setTool('select')" style="font-size:13px">🖱️</button>
    <button class="btn" onclick="setTool('line')" style="font-size:13px">📏</button>
    <button class="btn" onclick="setTool('move')" style="font-size:13px">✋</button>
    <button class="btn r" onclick="deleteSelected()" style="font-size:13px">🗑️</button>
    <div class="ws-pill" id="wsStatus"><span class="wsd"></span><span id="wsLabel">ONLINE</span></div>
  </div>
</div>

<div class="main">
<div class="chart-col">
  <div class="canvas-wrap" id="cwrap">
    <canvas id="cv"></canvas>
    <div id="pov"></div>
    <div class="flash" id="flash"></div>
    <div class="alert" id="alertBox"></div>
    <div class="tooltip" id="ttBox"><div class="tt-v" id="ttV"></div><div class="tt-s" id="ttS"></div></div>
    <button id="btnBack" onclick="voltarPresente()">◀ VOLTAR</button>
  </div>
  <div class="xbar">
    <span id="xL">—</span><span id="xM">—</span><span id="xR">—</span>
    <input type="range" class="xslider" id="xslider" min="5" max="100" value="40" oninput="CFG.showN=parseInt(this.value);draw()">
    <span id="xNow" style="color:var(--verde);font-size:12px">—</span>
  </div>
</div>

<div class="data-sb">
  <div class="kv-block">
    <div class="kv"><span class="kk">Último</span><span class="kvv" id="sCot">—</span></div>
    <div class="kv"><span class="kk">Total</span><span class="kvv" id="sTot">0</span></div>
    <div class="kv"><span class="kk">Status</span><span class="kvv" id="statusCon">🟢 Online</span></div>
  </div>
  <div class="border-status" id="borderStatus">
    <span id="borderText">🔮 ANALISANDO PADRÃO...</span>
  </div>
  <div class="highlight-block" id="rosaBlock">
    <div class="highlight-title">🌹 MAIOR VELA ROSA (ÚLTIMA HORA)</div>
    <div class="highlight-value" id="maiorRosaValor">—</div>
    <div class="highlight-time" id="maiorRosaTime">—</div>
  </div>
  <div class="pattern-area" id="patternArea">
    <div class="pattern-title">📊 PADRÃO</div>
    <div class="pattern-value" id="patternDetected">—</div>
  </div>
  <div class="sbh">LOG (clique na vela)</div>
  <div class="log-area" id="logArea"></div>
</div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════════════════════════
const SERVIDOR_URL = "https://aviator-trader-quadrado.onrender.com";
const PAINEL = 1;

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
const cwrap = document.getElementById('cwrap');

let pts = [];
let pollingInterval = null;
let ultimoTimestamp = 0;
let ultimoAlertaPadrao = 0;
let audioCtx = null;

let selectedVelaIndex = -1;
let currentBorderColor = 'azul';
let minutagemAtiva = false;
let minutagemTimer = null;
let sequenciaRosa = 0;

const COR = { ROSA: '#f472b6', ROXO: '#a855f7', AZUL: '#06b6d4' };

let CFG = {
  showN: 40,
  showMA: true,
  mm1On: true, mm1Per: 9, mm1Cor: '#f59e0b', mm1Lw: 1.5, mm1Curva: 'smooth',
  mm2On: true, mm2Per: 21, mm2Cor: '#06b6d4', mm2Lw: 1.2, mm2Curva: 'linear',
  mm3On: true, mm3Per: 50, mm3Cor: '#22c55e', mm3Lw: 1.0, mm3Curva: 'bezier',
  mm4On: true, mm4Per: 100, mm4Cor: '#ef4444', mm4Lw: 1.0, mm4Curva: 'smooth',
  mm5On: true, mm5Per: 200, mm5Cor: '#eab308', mm5Lw: 0.9, mm5Curva: 'linear',
  mm6On: false, mm6Per: 7, mm6Cor: '#ffffff', mm6Lw: 0.8, mm6Curva: 'step',
  mm7On: false, mm7Per: 14, mm7Cor: '#ec4899', mm7Lw: 0.8, mm7Curva: 'monoton',
  mm8On: false, mm8Per: 30, mm8Cor: '#3b82f6', mm8Lw: 0.8, mm8Curva: 'cardinal'
};

let viewOffset = 0, zoomLevel = 1.0, vertOffset = 0, scaleW = 60;
let isPanning = false, panX0 = 0, panOff0 = 0;
let _mx = 0, _my = 0;

let currentTool = 'select';
let drawings = [];
let selectedDrawing = null;
let isDrawing = false, drawStart = null;
let isMoving = false;
let movingLine = null;
let movingPoint = null;
let moveOffsetX = 0, moveOffsetY = 0;

function piscarElemento(elementId, cor, mensagem) {
  const el = document.getElementById(elementId);
  if (!el) return;
  el.classList.remove('border-azul', 'border-roxo', 'border-rosa');
  el.classList.add(`border-${cor}`);
  document.getElementById('borderText').innerHTML = mensagem;
  el.classList.add('pisca');
  setTimeout(() => el.classList.remove('pisca'), 1500);
  playBeep();
  if (minutagemTimer) clearTimeout(minutagemTimer);
  minutagemTimer = setTimeout(() => {
    minutagemAtiva = false;
    atualizarCorBorda();
  }, 5000);
}

function verificarMinutagem() {
  if (pts.length < 2) return false;
  const ultimaVela = pts[pts.length-1];
  const penultimaVela = pts[pts.length-2];
  let diffMinutos = ultimaVela.time.getMinutes() - penultimaVela.time.getMinutes();
  if (diffMinutos < 0) diffMinutos += 60;
  const isRoxa = ultimaVela.val >= 2 && ultimaVela.val < 10;
  const isRosa = ultimaVela.val >= 10;
  const minutagemRosa = (diffMinutos === 3 || diffMinutos === 5 || diffMinutos === 7 || diffMinutos === 10);
  const minutagemRoxa = (diffMinutos === 2 || diffMinutos === 4 || diffMinutos === 6 || diffMinutos === 8);
  
  if (minutagemRosa && isRosa) {
    minutagemAtiva = true;
    piscarElemento('borderStatus', 'rosa', `🌹 MINUTAGEM! ${diffMinutos} min`);
    showAlert(`🌹 MINUTAGEM! ${diffMinutos} minutos!`, '#f472b6', 4000);
    return true;
  }
  if (minutagemRoxa && isRoxa) {
    minutagemAtiva = true;
    piscarElemento('borderStatus', 'roxo', `🟣 PAGANDO ROXO! ${diffMinutos} min`);
    showAlert(`🟣 PAGANDO ROXO! ${diffMinutos} minutos!`, '#a855f7', 4000);
    return true;
  }
  return false;
}

function atualizarCorBorda() {
  if (minutagemAtiva) return;
  if (pts.length < 10) {
    document.getElementById('borderText').innerHTML = '🔮 AGUARDANDO DADOS...';
    document.getElementById('borderStatus').className = 'border-status border-azul';
    return;
  }
  const ultimas20 = pts.slice(-20);
  const valores = ultimas20.map(p => p.val);
  let azuis = 0, roxas = 0, rosas = 0;
  for (const v of valores) {
    if (v >= 10) rosas++;
    else if (v >= 2) roxas++;
    else azuis++;
  }
  let sequenciaAtual = 0;
  for (let i = valores.length-1; i >= 0; i--) {
    if (valores[i] >= 10) sequenciaAtual++;
    else break;
  }
  sequenciaRosa = sequenciaAtual;
  const proporcaoRoxoAzul = roxas / (azuis + 1);
  let novaCor = 'azul';
  let mensagem = '';
  
  if (sequenciaRosa >= 2) {
    novaCor = 'rosa';
    mensagem = `🌹 ${sequenciaRosa} ROSAS SEGUIDAS!`;
  } else if (proporcaoRoxoAzul > 1.2 && azuis <= 3) {
    novaCor = 'roxo';
    mensagem = `🟣 PAGANDO ROXO!`;
  } else if (azuis >= 5) {
    novaCor = 'azul';
    mensagem = `🔵 FALSO PAGUE AMARELO!`;
  } else {
    const ultimaVela = valores[valores.length-1];
    if (ultimaVela >= 10) { novaCor = 'rosa'; mensagem = '🌹 ÚLTIMA ROSA!'; }
    else if (ultimaVela >= 2) { novaCor = 'roxo'; mensagem = '🟣 ÚLTIMA ROXA'; }
    else { novaCor = 'azul'; mensagem = '🔵 CORREÇÃO'; }
  }
  currentBorderColor = novaCor;
  const borderDiv = document.getElementById('borderStatus');
  borderDiv.className = `border-status border-${novaCor}`;
  document.getElementById('borderText').innerHTML = mensagem;
}

function atualizarMaiorRosa() {
  if (pts.length === 0) {
    document.getElementById('maiorRosaValor').innerHTML = '—';
    document.getElementById('maiorRosaTime').innerHTML = '—';
    return;
  }
  const agora = new Date();
  const umaHoraAtras = new Date(agora.getTime() - 60 * 60 * 1000);
  const rosasUltimaHora = pts.filter(p => p.val >= 10 && p.time > umaHoraAtras);
  if (rosasUltimaHora.length === 0) {
    document.getElementById('maiorRosaValor').innerHTML = 'Nenhuma';
    document.getElementById('maiorRosaTime').innerHTML = 'na última hora';
    return;
  }
  let maior = rosasUltimaHora[0];
  for (let i = 1; i < rosasUltimaHora.length; i++) {
    if (rosasUltimaHora[i].val > maior.val) maior = rosasUltimaHora[i];
  }
  document.getElementById('maiorRosaValor').innerHTML = maior.val.toFixed(2) + 'x';
  document.getElementById('maiorRosaTime').innerHTML = 'às ' + maior.time.toLocaleTimeString('pt-BR');
}

function selecionarVela(index) {
  selectedVelaIndex = index;
  document.querySelectorAll('.log-row').forEach((row, i) => {
    if (i === (pts.length - 1 - index)) row.classList.add('selecionado');
    else row.classList.remove('selecionado');
  });
  const n = getVisN();
  const totalPts = pts.length;
  if (index >= 0 && index < totalPts) {
    let newOffset = totalPts - index - Math.floor(n / 2);
    newOffset = Math.max(0, Math.min(totalPts - n, newOffset));
    viewOffset = newOffset;
    document.getElementById('btnBack').classList.toggle('show', viewOffset > 2);
    draw();
    showAlert(`📍 Vela #${index + 1}: ${pts[index].val.toFixed(2)}x`, '#60a5fa', 1500);
  }
}

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBeep() {
  try {
    const ac = getAC();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.3;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.00001, ac.currentTime + 0.5);
    osc.stop(ac.currentTime + 0.5);
  } catch(e) {}
}

function col(v) {
  if (v >= 10) return COR.ROSA;
  if (v >= 2) return COR.ROXO;
  return COR.AZUL;
}

function calcularEMA(dados, periodo, extendFuturo = 10) {
  const k = 2 / (periodo + 1);
  let ema = dados[0];
  const resultado = [ema];
  for (let i = 1; i < dados.length; i++) {
    ema = dados[i] * k + ema * (1 - k);
    resultado.push(ema);
  }
  let ultimo = ema;
  for (let i = 0; i < extendFuturo; i++) {
    ultimo = ultimo * (1 - k);
    resultado.push(ultimo);
  }
  return resultado;
}

const curvaFn = {
  linear: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=1;i<p.length;i++)ctx.lineTo(sx(i),sy(p[i]));ctx.stroke(); },
  smooth: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=0;i<p.length-1;i++){const x1=sx(i),y1=sy(p[i]),x2=sx(i+1),y2=sy(p[i+1]);ctx.bezierCurveTo(x1+(x2-x1)*0.33,y1,x1+(x2-x1)*0.66,y2,x2,y2);}ctx.stroke(); },
  bezier: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=0;i<p.length-1;i++){const x1=sx(i),y1=sy(p[i]),x2=sx(i+1),y2=sy(p[i+1]);ctx.bezierCurveTo(x1+(x2-x1)*0.25,y1-Math.abs(p[i+1]-p[i])*2,x2-(x2-x1)*0.25,y2+Math.abs(p[i+1]-p[i])*2,x2,y2);}ctx.stroke(); },
  step: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=1;i<p.length;i++){ctx.lineTo(sx(i),sy(p[i-1]));ctx.lineTo(sx(i),sy(p[i]));}ctx.stroke(); },
  monoton: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=1;i<p.length;i++){const mx=(sx(i-1)+sx(i))/2;ctx.quadraticCurveTo(sx(i-1),sy(p[i-1]),mx,(sy(p[i-1])+sy(p[i]))/2);ctx.quadraticCurveTo(sx(i),sy(p[i]),sx(i),sy(p[i]));}ctx.stroke(); },
  cardinal: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));const tension=0.5;for(let i=0;i<p.length-1;i++){const x0=sx(Math.max(0,i-1)),y0=sy(p[Math.max(0,i-1)]);const x1=sx(i),y1=sy(p[i]);const x2=sx(i+1),y2=sy(p[i+1]);const x3=sx(Math.min(p.length-1,i+2)),y3=sy(p[Math.min(p.length-1,i+2)]);const cp1x=x1+(x2-x0)*tension,cp1y=y1+(y2-y0)*tension;const cp2x=x2-(x3-x1)*tension,cp2y=y2-(y3-y1)*tension;ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x2,y2);}ctx.stroke(); },
  natural: (p,sx,sy) => { if(p.length<2)return; const n=p.length; const h=[]; for(let i=0;i<n-1;i++)h[i]=sx(i+1)-sx(i); const alpha=[]; const l=[]; const mu=[]; const z=[]; for(let i=1;i<n-1;i++){alpha[i]=3/h[i]*(sy(p[i+1])-sy(p[i]))-3/h[i-1]*(sy(p[i])-sy(p[i-1]));} l[0]=1; mu[0]=0; z[0]=0; for(let i=1;i<n-1;i++){l[i]=2*(sx(i+1)-sx(i-1))-h[i-1]*mu[i-1];mu[i]=h[i]/l[i];z[i]=(alpha[i]-h[i-1]*z[i-1])/l[i];} l[n-1]=1; z[n-1]=0; const b=[]; const c=[]; const d=[]; c[n-1]=0; for(let i=n-2;i>=0;i--){c[i]=z[i]-mu[i]*c[i+1];b[i]=(sy(p[i+1])-sy(p[i]))/h[i]-h[i]*(c[i+1]+2*c[i])/3;d[i]=(c[i+1]-c[i])/(3*h[i]);} ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=0;i<n-1;i++){const step=10;for(let t=0;t<=step;t++){const tNorm=t/step;const x=sx(i)+tNorm*h[i];const y=sy(p[i])+b[i]*tNorm*h[i]+c[i]*Math.pow(tNorm*h[i],2)+d[i]*Math.pow(tNorm*h[i],3);if(t===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}}ctx.stroke(); },
  basis: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=1;i<p.length-1;i++){const x0=sx(i-1),y0=sy(p[i-1]);const x1=sx(i),y1=sy(p[i]);const x2=sx(i+1),y2=sy(p[i+1]);const cp1x=x1+(x2-x0)/6,cp1y=y1+(y2-y0)/6;const cp2x=x2-(x2-x0)/6,cp2y=y2-(y2-y0)/6;ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,x2,y2);}ctx.stroke(); }
};

let fundoDetectado = false;
let reversaoCooldown = 0;

function checkReversao(emaArr) {
  if (emaArr.length < 5) return;
  const n = emaArr.length;
  const a0 = emaArr[n-1], a1 = emaArr[n-2], a2 = emaArr[n-3];
  const acima0 = a0.e1 > a0.e2;
  const acima1 = a1.e1 > a1.e2;
  const acima2 = a2.e1 > a2.e2;
  
  if (acima2 && acima1 && !acima0) fundoDetectado = true;
  
  if (!acima2 && !acima1 && acima0 && fundoDetectado) {
    fundoDetectado = false;
    const agora = Date.now();
    if (agora - reversaoCooldown > 60000) {
      reversaoCooldown = agora;
      if (pts.length > 0) {
        pts[pts.length-1].sinalEntrada = true;
        showAlert('🚀 REVERSÃO! ENTRADA CONFIRMADA!', '#22c55e', 8000);
        playBeep();
        triggerFlash();
      }
    }
  }
}

function analisarPadroes() {
  if (pts.length < 10) return null;
  const ultimas = pts.slice(-12);
  const valores = ultimas.map(p => p.val);
  let sequenciaBaixa = 0;
  for (let i = valores.length-1; i >= 0; i--) {
    if (valores[i] >= 1.00 && valores[i] <= 1.20) sequenciaBaixa++;
    else break;
  }
  if (sequenciaBaixa >= 3 && sequenciaBaixa <= 6) {
    const previsao = sequenciaBaixa >= 4 ? 'ROSA' : 'ROXA';
    return { tipo: '📊 ACÚMULO', detalhe: `${sequenciaBaixa} velas na zona baixa`, previsao: previsao };
  }
  return null;
}

function verificarPadrao() {
  if (pts.length < 8) return false;
  const padrao = analisarPadroes();
  if (!padrao) return false;
  const agora = Date.now();
  if (agora - ultimoAlertaPadrao < 60000) return false;
  const ultimaVela = pts[pts.length-1];
  if (ultimaVela.val >= 1.00 && ultimaVela.val <= 1.30) {
    ultimoAlertaPadrao = agora;
    if (pts.length >= 2) pts[pts.length-2].sinalPadrao = true;
    document.getElementById('patternDetected').innerHTML = `${padrao.tipo}<br>${padrao.detalhe}<br>→ ${padrao.previsao}`;
    showAlert(`🔔 ${padrao.tipo}\n${padrao.detalhe}`, '#f59e0b', 5000);
    return true;
  }
  return false;
}

function addLog(vela, index, isSinal = false) {
  const t = vela.time.toLocaleTimeString('pt-BR');
  const v = vela.val;
  let classe, cor;
  if (v >= 10) { classe = 'rosa'; cor = COR.ROSA; }
  else if (v >= 2) { classe = 'roxa'; cor = COR.ROXO; }
  else { classe = 'azul'; cor = COR.AZUL; }
  
  const area = document.getElementById('logArea');
  const row = document.createElement('div');
  row.className = 'log-row';
  if (selectedVelaIndex === index) row.classList.add('selecionado');
  if (isSinal) row.style.background = 'rgba(34,197,94,0.15)';
  row.setAttribute('data-index', index);
  row.onclick = (function(idx) { return function() { selecionarVela(idx); }; })(index);
  row.innerHTML = `<div class="ldot" style="background:${cor}"></div>
                   <span class="lt">${t}</span>
                   <span class="lv" style="color:${cor}">${v.toFixed(2)}x</span>
                   <span class="ltag ${classe}">${classe.toUpperCase()}</span>
                   ${isSinal ? '<span class="ltag sinal">⚡ SINAL</span>' : ''}`;
  area.insertBefore(row, area.firstChild);
  while(area.children.length > 35) area.removeChild(area.lastChild);
}

function showAlert(msg, color, dur=4000) {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.style.cssText = `background:${color}22;border:1px solid ${color};color:${color};white-space:normal;max-width:90%;font-size:10px`;
  el.className = 'alert show';
  setTimeout(() => el.className = 'alert', dur);
}

function triggerFlash() { const f = document.getElementById('flash'); f.className='flash on'; setTimeout(()=>f.className='flash',400); }

function setStatus(online) {
  const statusEl = document.getElementById('statusCon');
  const wsStatus = document.getElementById('wsStatus');
  const wsLabel = document.getElementById('wsLabel');

    statusEl.innerHTML = '🟢 Online';

  }
}

async function buscarVelas() {
  try {
    const url = `${SERVIDOR_URL}/api/velas?painel=${PAINEL}&limit=500`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.velas && data.velas.length) {
      pts = [];
      ultimoTimestamp = 0;
      for (const v of data.velas) {
        if (v.rodada === 'TESTE_CONEXAO') continue;
        const mult = parseFloat(v.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          let ts = v.timestamp ? new Date(v.timestamp) : new Date();
          if (isNaN(ts.getTime())) ts = new Date();
          pts.push({ val: mult, time: ts, rodada: v.rodada });
          if (v.ts_recebido > ultimoTimestamp) ultimoTimestamp = v.ts_recebido;
        }
      }
      pts.sort((a,b)=>a.time-b.time);
      document.getElementById('sCot').textContent = pts.length ? pts[pts.length-1].val.toFixed(2)+'x' : '—';
      document.getElementById('sTot').textContent = pts.length;
      document.getElementById('logArea').innerHTML = '';
      for (let i = pts.length-1; i >= Math.max(0, pts.length-30); i--) addLog(pts[i], i);
      atualizarMaiorRosa();
      atualizarCorBorda();
      draw();
      setStatus(true);
    }
  } catch(e) { setStatus(false); }
}

async function buscarNovasVelas() {
  try {
    let url = `${SERVIDOR_URL}/api/velas?painel=${PAINEL}&limit=20`;
    if (ultimoTimestamp > 0) url += `&desde=${ultimoTimestamp}`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.velas && data.velas.length) {
      let novas = 0;
      for (const v of data.velas) {
        if (v.rodada === 'TESTE_CONEXAO') continue;
        const mult = parseFloat(v.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          const existe = pts.some(p => p.rodada === v.rodada);
          if (!existe) {
            let ts = v.timestamp ? new Date(v.timestamp) : new Date();
            if (isNaN(ts.getTime())) ts = new Date();
            pts.push({ val: mult, time: ts, rodada: v.rodada });
            addLog(pts[pts.length-1], pts.length-1);
            novas++;
          }
          if (v.ts_recebido > ultimoTimestamp) ultimoTimestamp = v.ts_recebido;
        }
      }
      if (novas > 0) {
        pts.sort((a,b)=>a.time-b.time);
        document.getElementById('sCot').textContent = pts[pts.length-1].val.toFixed(2)+'x';
        document.getElementById('sTot').textContent = pts.length;
        document.getElementById('logArea').innerHTML = '';
        for (let i = pts.length-1; i >= Math.max(0, pts.length-30); i--) addLog(pts[i], i);
        atualizarMaiorRosa();
        
        const minutagemDetectada = verificarMinutagem();
        if (!minutagemDetectada) atualizarCorBorda();
        
        if (verificarPadrao() && pts.length >= 2) pts[pts.length-2].sinalPadrao = true;
        draw();
        setStatus(true);
      }
    }
  } catch(e) {}
}

function setTool(tool) {
  currentTool = tool;
  if (tool !== 'move' && tool !== 'select') selectedDrawing = null;
  draw();
}

function deleteSelected() {
  if (selectedDrawing !== null) {
    drawings.splice(selectedDrawing, 1);
    selectedDrawing = null;
    draw();
    showAlert('✓ Linha removida', '#22c55e', 1000);
  } else {
    showAlert('Selecione uma linha primeiro', '#f59e0b', 1500);
  }
}

function addLine(x1, y1, x2, y2) {
  drawings.push({ type: 'line', x1, y1, x2, y2, color: '#f59e0b' });
  draw();
}

function getDrawingAt(x, y) {
  for (let i = drawings.length-1; i >= 0; i--) {
    const d = drawings[i];
    if (d.type === 'line') {
      const dx = d.x2 - d.x1, dy = d.y2 - d.y1;
      const len = Math.hypot(dx, dy);
      if (len === 0) continue;
      const t = Math.max(0, Math.min(1, ((x - d.x1) * dx + (y - d.y1) * dy) / (len * len)));
      const projX = d.x1 + t * dx, projY = d.y1 + t * dy;
      if (Math.hypot(x - projX, y - projY) < 12) return i;
    }
  }
  return -1;
}

function getPointAt(x, y, line) {
  if (Math.hypot(x - line.x1, y - line.y1) < 12) return 'start';
  if (Math.hypot(x - line.x2, y - line.y2) < 12) return 'end';
  return null;
}

function getVisN() { return Math.max(5, Math.round(CFG.showN / zoomLevel)); }
function getViewSub() {
  const n = getVisN();
  const end = Math.max(n, pts.length - viewOffset);
  const start = Math.max(0, end - n);
  return pts.slice(start, end);
}

function getScale(sub, W, H) {
  scaleW = Math.max(50, Math.min(100, scaleW));
  const vals = sub.map(p=>p.val);
  if (!vals.length) return { sx:()=>0, sy:()=>0, minV:0.8, maxV:2 };
  const minV = Math.max(0.85, Math.min(...vals) * 0.92);
  const maxV = Math.max(...vals) * 1.1;
  const cW = W - 12 - scaleW, cH = H - 50 - 20;
  const n = sub.length;
  const logMin = Math.log10(minV), logMax = Math.log10(maxV);
  const vsh = (vertOffset / cH) * (logMax - logMin);
  return {
    sx: i => 12 + i * ((cW - 30) / (n-1||1)),
    sy: v => 45 + cH * (1 - (Math.log10(Math.max(v,minV)) - logMin + vsh) / (logMax - logMin||1)),
    minV, maxV, cW, cH, logMin, logMax
  };
}

function draw() {
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;
  ctx.clearRect(0, 0, W, H);
  
  let bordaCor = currentBorderColor;
  if (minutagemAtiva) {
    bordaCor = document.getElementById('borderStatus').classList.contains('border-rosa') ? 'rosa' : 
               (document.getElementById('borderStatus').classList.contains('border-roxo') ? 'roxo' : 'azul');
  }
  ctx.strokeStyle = bordaCor === 'rosa' ? COR.ROSA : (bordaCor === 'roxo' ? COR.ROXO : COR.AZUL);
  ctx.lineWidth = 3;
  ctx.strokeRect(5, 5, W - 10, H - 10);
  
  const sub = getViewSub();
  if (sub.length < 2) return;
  const { sx, sy, minV, maxV } = getScale(sub, W, H);
  
  ctx.font = '7px monospace';
  [1, 2, 5, 10, 20, 50, 100].filter(v=>v>=minV&&v<=maxV*1.05).forEach(v=>{
    const py = sy(v);
    ctx.strokeStyle = v>=10?`${COR.ROSA}20`:v>=2?`${COR.ROXO}15`:'#0c1b2e';
    ctx.beginPath(); ctx.moveTo(10, py); ctx.lineTo(W-scaleW, py); ctx.stroke();
    ctx.fillStyle = v>=10?COR.ROSA:v>=2?COR.ROXO:'#1e3a58';
    ctx.fillText(v+'x', W-scaleW+4, py+2);
  });
  
  [[1, COR.AZUL], [2, COR.ROXO], [10, COR.ROSA]].forEach(([z,c])=>{
    if(z>=minV&&z<=maxV){ 
      const py = sy(z); 
      ctx.strokeStyle = c; 
      ctx.lineWidth = 2; 
      ctx.setLineDash([8,4]); 
      ctx.beginPath(); ctx.moveTo(10,py); ctx.lineTo(W-scaleW,py); ctx.stroke();
      ctx.fillStyle = c;
      ctx.font = 'bold 9px monospace';
      ctx.fillText(z===1?'1.00x ZONA AZUL':z===2?'2.00x ZONA ROXA':'10.00x ZONA ROSA', 15, py-5);
    }
  });
  ctx.setLineDash([]);
  
  const yBase = sy(minV);
  for(let i=1;i<sub.length;i++){
    const p0=sub[i-1],p1=sub[i], x0=sx(i-1),y0=sy(p0.val), x1=sx(i),y1=sy(p1.val);
    ctx.beginPath(); ctx.moveTo(x0,yBase); ctx.lineTo(x0,y0);
    const cp1x=x0+(x1-x0)*0.42, cp2x=x0+(x1-x0)*0.58;
    ctx.bezierCurveTo(cp1x,y0,cp2x,y1,x1,y1);
    ctx.lineTo(x1,yBase); ctx.fillStyle = col(Math.max(p0.val,p1.val))+'20'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.bezierCurveTo(cp1x,y0,cp2x,y1,x1,y1);
    ctx.strokeStyle = col(p1.val); ctx.lineWidth = 2; ctx.stroke();
  }
  
  if (CFG.showMA && pts.length >= 2) {
    const valores = pts.map(p=>p.val);
    const subStart = Math.max(0, pts.length - viewOffset - sub.length);
    for (let i=1; i<=8; i++) {
      if (!CFG[`mm${i}On`] || pts.length < CFG[`mm${i}Per`]) continue;
      const ema = calcularEMA(valores, CFG[`mm${i}Per`], 10);
      const slice = ema.slice(subStart, subStart + sub.length + 15);
      if (slice.length < 2) continue;
      ctx.strokeStyle = CFG[`mm${i}Cor`];
      ctx.lineWidth = CFG[`mm${i}Lw`];
      ctx.setLineDash(i>=3?[5,3]:[]);
      (curvaFn[CFG[`mm${i}Curva`]] || curvaFn.linear)(slice, sx, sy);
    }
    ctx.setLineDash([]);
  }
  
  if (CFG.mm1On && CFG.mm2On && pts.length >= CFG.mm2Per) {
    const valores = pts.map(p=>p.val);
    const k1 = 2/(CFG.mm1Per+1), k2 = 2/(CFG.mm2Per+1);
    let e1 = valores[0], e2 = valores[0];
    const emaCheck = valores.map((v,i)=>{ if(i>0){ e1 = v*k1 + e1*(1-k1); e2 = v*k2 + e2*(1-k2); } return { e1, e2 }; });
    checkReversao(emaCheck);
  }
  
  sub.forEach((p,i)=>{
    const x=sx(i), y=sy(p.val), r = p.val>=10?6:p.val>=2?4.5:3;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = col(p.val); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth=1; ctx.stroke();
    
    const globalIndex = (pts.length - viewOffset - sub.length) + i;
    if (globalIndex === selectedVelaIndex) {
      ctx.beginPath(); ctx.arc(x, y, r+5, 0, Math.PI*2);
      ctx.strokeStyle = '#60a5fa';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    
    if(p.sinalEntrada){
      ctx.beginPath(); ctx.arc(x, y-12, 10, 0, Math.PI*2);
      ctx.fillStyle = '#22c55e'; ctx.fill();
      ctx.fillStyle = '#000'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
      ctx.fillText('⚡', x, y-10);
    }
    if(p.sinalPadrao){
      ctx.beginPath(); ctx.arc(x, y-12, 10, 0, Math.PI*2);
      ctx.fillStyle = '#f59e0b'; ctx.fill();
      ctx.fillStyle = '#000'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
      ctx.fillText('⚠️', x, y-10);
    }
  });
  
  drawings.forEach((d, idx) => {
    const sel = idx === selectedDrawing;
    ctx.strokeStyle = sel ? '#22c55e' : d.color;
    ctx.lineWidth = sel ? 2.5 : 1.8;
    if (d.type === 'line') {
      ctx.beginPath(); ctx.moveTo(d.x1, d.y1); ctx.lineTo(d.x2, d.y2); ctx.stroke();
      if (sel) {
        ctx.fillStyle = '#22c55e';
        ctx.beginPath(); ctx.arc(d.x1, d.y1, 6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(d.x2, d.y2, 6, 0, Math.PI*2); ctx.fill();
      }
    }
  });
  
  if (isDrawing && currentTool === 'line' && drawStart) {
    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 1.5; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(drawStart.x, drawStart.y); ctx.lineTo(_mx, _my); ctx.stroke();
    ctx.setLineDash([]);
  }
  
  const bx = W - scaleW;
  ctx.strokeStyle = 'rgba(32,53,85,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(bx, 30); ctx.lineTo(bx, H - 30); ctx.stroke();
  
  const ultimaVela = pts[pts.length-1];
  if (ultimaVela) {
    const posY = sy(ultimaVela.val);
    ctx.fillStyle = col(ultimaVela.val);
    ctx.beginPath(); ctx.arc(bx, posY, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ultimaVela.val.toFixed(2) + 'x', bx, posY + 3);
  }
  
  for (let gy = H/2 - 15; gy <= H/2 + 15; gy += 8) {
    ctx.fillStyle = 'rgba(74,110,148,0.6)';
    ctx.fillRect(bx - 3, gy, 6, 3);
  }
  
  if (sub.length) {
    document.getElementById('xL').textContent = sub[0].time.toLocaleTimeString('pt-BR');
    document.getElementById('xM').textContent = sub[Math.floor(sub.length/2)].time.toLocaleTimeString('pt-BR');
    document.getElementById('xR').textContent = sub[sub.length-1].time.toLocaleTimeString('pt-BR');
  }
  document.getElementById('xslider').value = CFG.showN;
}

function getPos(e) {
  const rect = cwrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function onScaleBorder(pos) { return Math.abs(pos.x - (canvas.width - scaleW)) < 12; }

let scaleResizing = false, scaleRX = 0, scaleRW = 0;

function onMouseDown(e) {
  e.preventDefault();
  const pos = getPos(e);
  
  if (onScaleBorder(pos)) {
    scaleResizing = true;
    scaleRX = pos.x;
    scaleRW = scaleW;
    return;
  }
  
  if (currentTool === 'select') {
    const idx = getDrawingAt(pos.x, pos.y);
    if (idx !== -1) { selectedDrawing = idx; draw(); }
    else { selectedDrawing = null; draw(); }
  } else if (currentTool === 'line') {
    isDrawing = true; drawStart = { x: pos.x, y: pos.y };
  } else if (currentTool === 'move') {
    const idx = getDrawingAt(pos.x, pos.y);
    if (idx !== -1) {
      selectedDrawing = idx;
      const line = drawings[idx];
      const ponto = getPointAt(pos.x, pos.y, line);
      if (ponto) {
        isMoving = true; movingLine = idx; movingPoint = ponto;
        moveOffsetX = pos.x - (ponto === 'start' ? line.x1 : line.x2);
        moveOffsetY = pos.y - (ponto === 'start' ? line.y1 : line.y2);
      } else {
        isMoving = true; movingLine = idx; movingPoint = null;
        moveOffsetX = pos.x - line.x1;
        moveOffsetY = pos.y - line.y1;
      }
      draw();
    } else {
      selectedDrawing = null;
      draw();
      isPanning = true; panX0 = pos.x; panOff0 = viewOffset;
      document.getElementById('pov').style.display = 'block';
    }
  } else {
    isPanning = true; panX0 = pos.x; panOff0 = viewOffset;
    document.getElementById('pov').style.display = 'block';
  }
}

function onMouseMove(e) {
  const pos = getPos(e);
  _mx = pos.x; _my = pos.y;
  
  if (scaleResizing) {
    scaleW = Math.max(44, Math.min(160, scaleRW + (scaleRX - pos.x)));
    draw();
    return;
  }
  
  if (isPanning) {
    const sub = getViewSub();
    if (sub.length >= 2) {
      const step = (canvas.width - 12 - scaleW) / (sub.length - 1 || 1);
      const shift = Math.round((panX0 - pos.x) / step);
      viewOffset = Math.max(0, Math.min(pts.length - getVisN(), panOff0 + shift));
      document.getElementById('btnBack').classList.toggle('show', viewOffset > 2);
      draw();
    }
  } else if (isMoving && movingLine !== null) {
    const line = drawings[movingLine];
    if (movingPoint === 'start') {
      drawings[movingLine].x1 = pos.x - moveOffsetX;
      drawings[movingLine].y1 = pos.y - moveOffsetY;
    } else if (movingPoint === 'end') {
      drawings[movingLine].x2 = pos.x - moveOffsetX;
      drawings[movingLine].y2 = pos.y - moveOffsetY;
    } else {
      const dx = pos.x - moveOffsetX - line.x1;
      const dy = pos.y - moveOffsetY - line.y1;
      drawings[movingLine].x1 += dx;
      drawings[movingLine].y1 += dy;
      drawings[movingLine].x2 += dx;
      drawings[movingLine].y2 += dy;
      moveOffsetX = pos.x - drawings[movingLine].x1;
      moveOffsetY = pos.y - drawings[movingLine].y1;
    }
    draw();
  } else if (isDrawing && currentTool === 'line') { draw(); }
  
  const sub = getViewSub();
  if (sub.length >= 2 && !isPanning && !isDrawing && !scaleResizing) {
    const step = (canvas.width - 12 - scaleW) / (sub.length - 1 || 1);
    const idx = Math.round((pos.x - 12) / step);
    const tt = document.getElementById('ttBox');
    if (idx >= 0 && idx < sub.length && pos.x < canvas.width - scaleW && !onScaleBorder(pos)) {
      const p = sub[idx];
      document.getElementById('ttV').textContent = p.val.toFixed(2) + 'x';
      document.getElementById('ttV').style.color = col(p.val);
      document.getElementById('ttS').textContent = p.time.toLocaleTimeString('pt-BR');
      tt.style.display = 'block';
      tt.style.left = Math.min(pos.x + 12, canvas.width - scaleW - 15) + 'px';
      tt.style.top = Math.max(5, pos.y - 42) + 'px';
    } else { tt.style.display = 'none'; }
  }
}

function onMouseUp(e) {
  if (scaleResizing) { scaleResizing = false; return; }
  if (isDrawing && currentTool === 'line' && drawStart) {
    addLine(drawStart.x, drawStart.y, _mx, _my);
    isDrawing = false; drawStart = null;
  }
  document.getElementById('pov').style.display = 'none';
  isPanning = false;
  isMoving = false;
  movingLine = null;
  movingPoint = null;
}

cwrap.addEventListener('mousedown', onMouseDown);
cwrap.addEventListener('mousemove', onMouseMove);
cwrap.addEventListener('mouseup', onMouseUp);
cwrap.addEventListener('wheel', e => { e.preventDefault(); e.deltaY < 0 ? zoomIn() : zoomOut(); draw(); }, { passive: false });

function zoomIn() { zoomLevel = Math.min(10, zoomLevel * 1.2); draw(); }
function zoomOut() { zoomLevel = Math.max(0.3, zoomLevel / 1.2); draw(); }
function resetView() { zoomLevel = 1.0; viewOffset = 0; vertOffset = 0; draw(); }
function voltarPresente() { viewOffset = 0; document.getElementById('btnBack').classList.remove('show'); draw(); selectedVelaIndex = -1; }
function toggleMA() { CFG.showMA = !CFG.showMA; document.getElementById('maBtn').classList.toggle('on', CFG.showMA); draw(); }

function openCfgMM() {
  const lista = document.getElementById('mmConfigLista');
  const mms = [
    { id:1, nome:'MM1 (9)', cor:CFG.mm1Cor, per:CFG.mm1Per, on:CFG.mm1On, lw:CFG.mm1Lw, curva:CFG.mm1Curva },
    { id:2, nome:'MM2 (21)', cor:CFG.mm2Cor, per:CFG.mm2Per, on:CFG.mm2On, lw:CFG.mm2Lw, curva:CFG.mm2Curva },
    { id:3, nome:'MM3 (50)', cor:CFG.mm3Cor, per:CFG.mm3Per, on:CFG.mm3On, lw:CFG.mm3Lw, curva:CFG.mm3Curva },
    { id:4, nome:'MM4 (100)', cor:CFG.mm4Cor, per:CFG.mm4Per, on:CFG.mm4On, lw:CFG.mm4Lw, curva:CFG.mm4Curva },
    { id:5, nome:'MM5 (200)', cor:CFG.mm5Cor, per:CFG.mm5Per, on:CFG.mm5On, lw:CFG.mm5Lw, curva:CFG.mm5Curva },
    { id:6, nome:'MM6 (7)', cor:CFG.mm6Cor, per:CFG.mm6Per, on:CFG.mm6On, lw:CFG.mm6Lw, curva:CFG.mm6Curva },
    { id:7, nome:'MM7 (14)', cor:CFG.mm7Cor, per:CFG.mm7Per, on:CFG.mm7On, lw:CFG.mm7Lw, curva:CFG.mm7Curva },
    { id:8, nome:'MM8 (30)', cor:CFG.mm8Cor, per:CFG.mm8Per, on:CFG.mm8On, lw:CFG.mm8Lw, curva:CFG.mm8Curva }
  ];
  lista.innerHTML = mms.map(mm => `
    <div class="mm-row">
      <span class="mm-label" style="color:${mm.cor}">${mm.nome}</span>
      <div class="mm-toggle ${mm.on ? 'on' : ''}" onclick="toggleMM(${mm.id})"></div>
      <input type="number" class="mm-num" id="mmPer${mm.id}" value="${mm.per}" min="2" max="500">
      <input type="color" class="mm-color" id="mmCor${mm.id}" value="${mm.cor}">
      <input type="number" class="mm-op" id="mmLw${mm.id}" value="${mm.lw}" step="0.1" min="0.5" max="3">
      <select class="mm-sel" id="mmCurva${mm.id}">
        <option value="linear" ${mm.curva==='linear'?'selected':''}>Linear</option>
        <option value="smooth" ${mm.curva==='smooth'?'selected':''}>Smooth</option>
        <option value="bezier" ${mm.curva==='bezier'?'selected':''}>Bezier</option>
        <option value="step" ${mm.curva==='step'?'selected':''}>Step</option>
        <option value="monoton" ${mm.curva==='monoton'?'selected':''}>Monoton</option>
        <option value="cardinal" ${mm.curva==='cardinal'?'selected':''}>Cardinal</option>
        <option value="natural" ${mm.curva==='natural'?'selected':''}>Natural Spline</option>
        <option value="basis" ${mm.curva==='basis'?'selected':''}>Basis</option>
      </select>
    </div>
  `).join('');
  document.getElementById('mmModal').classList.add('open');
}

function closeCfgMM() { document.getElementById('mmModal').classList.remove('open'); }
function toggleMM(id) { CFG[`mm${id}On`] = !CFG[`mm${id}On`]; openCfgMM(); draw(); }

function aplicarCfgMM() {
  for(let i=1;i<=8;i++){
    CFG[`mm${i}Per`] = parseInt(document.getElementById(`mmPer${i}`).value) || CFG[`mm${i}Per`];
    CFG[`mm${i}Cor`] = document.getElementById(`mmCor${i}`).value;
    CFG[`mm${i}Lw`] = parseFloat(document.getElementById(`mmLw${i}`).value) || CFG[`mm${i}Lw`];
    CFG[`mm${i}Curva`] = document.getElementById(`mmCurva${i}`).value;
  }
  closeCfgMM(); draw(); showAlert('Configurações salvas!', '#22c55e', 1500);
}

function resetCfgMM() {
  CFG.mm1On=true; CFG.mm1Per=9; CFG.mm1Cor='#f59e0b'; CFG.mm1Lw=1.5; CFG.mm1Curva='smooth';
  CFG.mm2On=true; CFG.mm2Per=21; CFG.mm2Cor='#06b6d4'; CFG.mm2Lw=1.2; CFG.mm2Curva='linear';
  CFG.mm3On=true; CFG.mm3Per=50; CFG.mm3Cor='#22c55e'; CFG.mm3Lw=1.0; CFG.mm3Curva='bezier';
  CFG.mm4On=true; CFG.mm4Per=100; CFG.mm4Cor='#ef4444'; CFG.mm4Lw=1.0; CFG.mm4Curva='smooth';
  CFG.mm5On=true; CFG.mm5Per=200; CFG.mm5Cor='#eab308'; CFG.mm5Lw=0.9; CFG.mm5Curva='linear';
  CFG.mm6On=false; CFG.mm6Per=7; CFG.mm6Cor='#ffffff'; CFG.mm6Lw=0.8; CFG.mm6Curva='step';
  CFG.mm7On=false; CFG.mm7Per=14; CFG.mm7Cor='#ec4899'; CFG.mm7Lw=0.8; CFG.mm7Curva='monoton';
  CFG.mm8On=false; CFG.mm8Per=30; CFG.mm8Cor='#3b82f6'; CFG.mm8Lw=0.8; CFG.mm8Curva='cardinal';
  openCfgMM(); draw(); showAlert('Resetado!', '#22c55e', 1500);
}

function resize() {
  const dpr = window.devicePixelRatio || 2;
  const w = cwrap.clientWidth, h = cwrap.clientHeight;
  canvas.width = Math.max(400, Math.round(w * dpr));
  canvas.height = Math.max(300, Math.round(h * dpr));
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
new ResizeObserver(resize).observe(cwrap);
setInterval(() => { document.getElementById('xNow').textContent = new Date().toLocaleTimeString('pt-BR'); }, 1000);

resize();
setTool('select');

setTimeout(async () => {
  await buscarVelas();
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(() => buscarNovasVelas(), 2000);
  showAlert('✅ Conectado! Sistema IA ativo', '#22c55e', 3000);
}, 500);
</script>

<div class="modal-bg" id="mmModal" onclick="if(event.target===this)closeCfgMM()">
  <div class="modal">
    <div class="m-title">Configurar MMs <span class="m-x" onclick="closeCfgMM()">✕</span></div>
    <div id="mmConfigLista"></div>
    <div class="m-btns">
      <button class="mbtn mb-g" onclick="aplicarCfgMM()">Aplicar</button>
      <button class="mbtn mb-r" onclick="resetCfgMM()">Reset</button>
      <button class="mbtn mb-c" onclick="closeCfgMM()">Fechar</button>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator v7 - NOVO PAINEL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;font-family:monospace;color:#b8d0ec;padding:20px}
.verde{color:#22c55e}
.rosa{color:#f472b6}
.roxa{color:#a855f7}
.ciano{color:#06b6d4}
button{background:#0e1522;border:1px solid #203555;color:#4a6e94;padding:5px 12px;border-radius:4px;cursor:pointer}
button:hover{color:#fff}
canvas{background:#05080f;border:1px solid #18273d;border-radius:4px}
.log{background:#0a0f1a;border:1px solid #18273d;border-radius:4px;height:200px;overflow-y:auto;padding:5px;font-size:10px}
.log div{padding:3px;border-bottom:1px solid #0e1522}
.toolbar{display:flex;gap:5px;margin-bottom:10px}
</style>
</head>
<body>

<h2>✈️ AVIATOR v7 - <span class="verde">ONLINE</span></h2>
<p>Servidor: <span class="ciano">aviator-trader-quadrado.onrender.com</span> | Painel 1</p>

<div class="toolbar">
  <button onclick="syncNow()">🔄 SINCRONIZAR</button>
  <button onclick="zoomIn()">🔍 +</button>
  <button onclick="zoomOut()">🔍 -</button>
  <button onclick="resetView()">⟳ RESET</button>
</div>

<div style="display:flex; gap:20px; margin-top:10px">
  <canvas id="chart" width="800" height="400" style="width:800px;height:400px;background:#05080f"></canvas>
  <div style="width:200px">
    <div style="background:#0a0f1a;padding:10px;border-radius:4px;margin-bottom:10px">
      <div>📊 Última: <span id="ultimo" class="verde">—</span></div>
      <div>📦 Total: <span id="total">0</span></div>
    </div>
    <div class="log" id="logArea"></div>
  </div>
</div>

<script>
const SERVIDOR = "https://aviator-trader-quadrado.onrender.com";
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');

let velas = [];
let zoom = 1;
let offset = 0;
let polling = null;

function addLog(v, rodada) {
  const t = new Date().toLocaleTimeString('pt-BR');
  const cor = v >= 10 ? '#f472b6' : v >= 2 ? '#a855f7' : '#06b6d4';
  const label = v >= 10 ? 'ROSA' : v >= 2 ? 'ROXA' : 'CIANO';
  const area = document.getElementById('logArea');
  const div = document.createElement('div');
  div.innerHTML = `<span style="color:${cor}">●</span> ${t} - <span style="color:${cor};font-weight:bold">${v.toFixed(2)}x</span> <span style="color:${cor}">${label}</span>`;
  area.insertBefore(div, area.firstChild);
  while(area.children.length > 30) area.removeChild(area.lastChild);
}

async function carregarVelas() {
  try {
    const res = await fetch(`${SERVIDOR}/api/velas?painel=1&limit=200`);
    const data = await res.json();
    if (data.velas) {
      velas = [];
      for (const v of data.velas) {
        if (v.rodada === 'TESTE_CONEXAO') continue;
        const mult = parseFloat(v.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          velas.push({ val: mult, ts: v.timestamp || new Date() });
        }
      }
      velas.sort((a,b) => new Date(a.ts) - new Date(b.ts));
      document.getElementById('total').innerText = velas.length;
      if (velas.length > 0) {
        const ult = velas[velas.length-1].val;
        document.getElementById('ultimo').innerHTML = ult.toFixed(2) + 'x';
        const cor = ult >= 10 ? '#f472b6' : ult >= 2 ? '#a855f7' : '#06b6d4';
        document.getElementById('ultimo').style.color = cor;
      }
      desenhar();
      console.log(`✅ ${velas.length} velas carregadas`);
    }
  } catch(e) { console.error('Erro:', e); }
}

function desenhar() {
  if (velas.length < 2) return;
  
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  
  const mostrar = Math.max(10, Math.floor(50 / zoom));
  const inicio = Math.max(0, velas.length - mostrar - offset);
  const fim = Math.min(velas.length, inicio + mostrar);
  const sub = velas.slice(inicio, fim);
  if (sub.length < 2) return;
  
  const minV = Math.max(0.85, Math.min(...sub.map(v=>v.val)) * 0.95);
  const maxV = Math.max(...sub.map(v=>v.val)) * 1.08;
  const logMin = Math.log10(minV), logMax = Math.log10(maxV);
  const margemEsq = 40, margemDir = 30;
  const largura = w - margemEsq - margemDir;
  const altura = h - 60;
  
  const sx = i => margemEsq + (i / (sub.length-1)) * largura;
  const sy = v => 40 + altura * (1 - (Math.log10(v) - logMin) / (logMax - logMin));
  
  // Linhas de zona
  ctx.beginPath();
  [1, 2, 10].forEach(z => {
    const y = sy(z);
    ctx.strokeStyle = z === 10 ? '#f472b650' : z === 2 ? '#a855f750' : '#06b6d450';
    ctx.lineWidth = 1;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(margemEsq, y); ctx.lineTo(w - margemDir, y); ctx.stroke();
  });
  ctx.setLineDash([]);
  
  // Linha do gráfico
  ctx.beginPath();
  ctx.moveTo(sx(0), sy(sub[0].val));
  for (let i = 1; i < sub.length; i++) {
    ctx.lineTo(sx(i), sy(sub[i].val));
  }
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Área
  ctx.beginPath();
  ctx.moveTo(sx(0), sy(minV));
  for (let i = 0; i < sub.length; i++) {
    ctx.lineTo(sx(i), sy(sub[i].val));
  }
  ctx.lineTo(sx(sub.length-1), sy(minV));
  ctx.fillStyle = '#22c55e20';
  ctx.fill();
  
  // Bolinhas
  for (let i = 0; i < sub.length; i++) {
    const v = sub[i].val;
    const cor = v >= 10 ? '#f472b6' : v >= 2 ? '#a855f7' : '#06b6d4';
    ctx.beginPath();
    ctx.arc(sx(i), sy(v), v >= 10 ? 6 : 4, 0, Math.PI*2);
    ctx.fillStyle = cor;
    ctx.fill();
  }
  
  // Grid Y
  [1, 2, 5, 10, 20, 50].forEach(v => {
    if (v >= minV && v <= maxV) {
      const y = sy(v);
      ctx.fillStyle = '#4a6e94';
      ctx.font = '8px monospace';
      ctx.fillText(v+'x', 5, y+2);
      ctx.strokeStyle = '#0c1b2e';
      ctx.beginPath(); ctx.moveTo(margemEsq, y); ctx.lineTo(w-margemDir, y); ctx.stroke();
    }
  });
  
  // Labels X
  ctx.fillStyle = '#4a6e94';
  ctx.font = '7px monospace';
  ctx.fillText(new Date(sub[0].ts).toLocaleTimeString(), margemEsq, h-15);
  ctx.fillText(new Date(sub[Math.floor(sub.length/2)].ts).toLocaleTimeString(), margemEsq + largura/2 - 20, h-15);
  ctx.fillText(new Date(sub[sub.length-1].ts).toLocaleTimeString(), w-margemDir-40, h-15);
}

async function sincronizar() {
  await carregarVelas();
}

function zoomIn() { zoom = Math.min(3, zoom * 1.2); desenhar(); }
function zoomOut() { zoom = Math.max(0.3, zoom / 1.2); desenhar(); }
function resetView() { zoom = 1; offset = 0; desenhar(); }

// Iniciar
carregarVelas();
polling = setInterval(async () => {
  try {
    const res = await fetch(`${SERVIDOR}/api/velas?painel=1&limit=10&desde=${Date.now() - 30000}`);
    const data = await res.json();
    if (data.velas && data.velas.length > 0) {
      let novas = 0;
      for (const v of data.velas) {
        if (v.rodada === 'TESTE_CONEXAO') continue;
        const mult = parseFloat(v.multiplicador);
        if (!isNaN(mult) && mult > 0 && !velas.some(existente => existente.val === mult && Math.abs(new Date(existente.ts) - new Date(v.timestamp)) < 1000)) {
          velas.push({ val: mult, ts: v.timestamp || new Date() });
          addLog(mult, v.rodada);
          novas++;
        }
      }
      if (novas > 0) {
        velas.sort((a,b) => new Date(a.ts) - new Date(b.ts));
        document.getElementById('total').innerText = velas.length;
        const ult = velas[velas.length-1].val;
        document.getElementById('ultimo').innerHTML = ult.toFixed(2) + 'x';
        const cor = ult >= 10 ? '#f472b6' : ult >= 2 ? '#a855f7' : '#06b6d4';
        document.getElementById('ultimo').style.color = cor;
        desenhar();
      }
    }
  } catch(e) {}
}, 3000);
</script>
</body>
</html>

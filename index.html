<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aviator v7 - Detector de Padrões</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05080f;--bg2:#0a0f1a;--bg3:#0e1522;--bg4:#121d2e;
  --brd:#18273d;--brd2:#203555;
  --txt:#b8d0ec;--txt2:#4a6e94;--txt3:#1e3a58;
  --up:#a855f7;--dn:#06b6d4;--pk:#f43f5e;--gn:#22c55e;--am:#f59e0b;
  --font:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);font-size:clamp(9px, 1.2vw, 14px);color:var(--txt)}
.root{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}
.main{display:flex;flex:1;overflow:hidden;min-height:0;flex-direction:row;flex-wrap:nowrap}

.topbar{height:clamp(38px, 5vh, 50px);background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;flex-shrink:0;padding:0 12px;gap:8px;overflow-x:auto}
.tb-logo{font-size:clamp(12px, 1.5vw, 18px);font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;white-space:nowrap}
.tb-dot{width:clamp(8px, 1vw, 12px);height:clamp(8px, 1vw, 12px);border-radius:50%;background:var(--gn);animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--gn)}50%{box-shadow:0 0 14px var(--gn)}}
.tb-mid{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.btn{padding:clamp(4px, 0.8vh, 8px) clamp(8px, 1.5vw, 16px);border-radius:6px;border:1px solid var(--brd2);background:var(--bg3);color:var(--txt2);font-size:clamp(9px, 1.2vw, 13px);font-family:var(--font);cursor:pointer;white-space:nowrap;transition:all .15s}
.btn:active{transform:scale(0.96)}
.btn.g{border-color:#166534;background:rgba(34,197,94,.1);color:var(--gn)}
.btn.b{border-color:#1e3a5f;background:rgba(96,165,250,.08);color:#60a5fa}
.ws-pill{display:flex;align-items:center;gap:6px;font-size:clamp(8px, 1vw, 11px);padding:0 8px}
.ws-pill.ok{color:var(--gn)}.ws-pill.err{color:var(--pk)}
.wsd{width:clamp(6px, 0.8vw, 10px);height:clamp(6px, 0.8vw, 10px);border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.toolbox{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--brd);border-radius:40px;display:flex;flex-direction:row;padding:8px 16px;gap:12px;z-index:100;backdrop-filter:blur(10px)}
.tool-btn{width:clamp(36px, 4vh, 48px);height:clamp(36px, 4vh, 48px);border-radius:30px;border:1px solid var(--brd2);background:var(--bg3);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(18px, 2.5vw, 24px);transition:all .15s}
.tool-btn:active{transform:scale(0.92)}
.tool-btn.active{border-color:var(--gn);background:rgba(34,197,94,.2);color:var(--gn)}
.tool-sep{width:1px;height:30px;background:var(--brd);margin:0}

.chart-col{flex:3;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);min-height:0}
#cv{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#pov{position:absolute;inset:0;z-index:19;display:none;cursor:grabbing}

.xbar{height:clamp(28px, 4vh, 38px);background:var(--bg2);border-top:1px solid var(--brd);display:flex;align-items:center;padding:0 12px;gap:12px;font-size:clamp(8px, 1vw, 11px);flex-shrink:0}
.xslider{flex:1;height:6px;-webkit-appearance:none;background:var(--brd2);border-radius:3px}
.xslider::-webkit-slider-thumb{-webkit-appearance:none;width:clamp(14px, 2vw, 20px);height:clamp(14px, 2vw, 20px);border-radius:50%;background:var(--gn);cursor:pointer}

.data-sb{flex:1;min-width:200px;max-width:280px;background:var(--bg2);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sbh{padding:clamp(6px, 1vh, 10px) 12px;font-size:clamp(7px, 0.9vw, 10px);color:var(--txt3);border-bottom:1px solid var(--brd);text-transform:uppercase}
.kv-block{padding:clamp(8px, 1.5vh, 12px) 12px;display:flex;gap:20px;border-bottom:1px solid var(--brd);flex-wrap:wrap}
.kv{display:flex;gap:8px;align-items:baseline}
.kk{font-size:clamp(8px, 1vw, 11px);color:var(--txt2)}.kvv{font-size:clamp(10px, 1.2vw, 14px);font-weight:700}
.pattern-area{background:var(--bg3);margin:8px;padding:8px;border-radius:8px;border-left:3px solid var(--am)}
.pattern-title{font-size:9px;color:var(--am);margin-bottom:4px}
.pattern-value{font-size:11px;font-weight:700;color:var(--gn)}
.log-area{flex:1;overflow-y:auto;min-height:100px}
.log-row{display:flex;align-items:center;gap:10px;padding:clamp(5px, 0.8vh, 8px) 12px;border-bottom:1px solid #070d15;font-size:clamp(9px, 1.1vw, 12px)}
.log-row:hover{background:var(--bg3)}
.ldot{width:clamp(8px, 1vw, 12px);height:clamp(8px, 1vw, 12px);border-radius:50%;flex-shrink:0}
.lt{color:var(--txt2);min-width:70px;font-size:clamp(8px, 1vw, 11px)}
.lv{font-weight:700;min-width:55px}
.ltag{font-size:clamp(7px, 0.9vw, 10px);padding:2px 8px;border-radius:4px;margin-left:auto}
.ltag.rosa{background:rgba(244,114,182,.2);color:#f472b6}
.ltag.roxa{background:rgba(168,85,247,.2);color:#a855f7}
.ltag.ciano{background:rgba(6,182,212,.2);color:#06b6d4}
.ltag.sinal{background:rgba(34,197,94,.3);color:#22c55e}
.ltag.pattern{background:rgba(245,158,11,.3);color:#f59e0b}

.tooltip{position:absolute;background:#080f1c;border:1px solid var(--brd2);border-radius:8px;padding:10px 14px;display:none;z-index:60;min-width:120px}
.tt-v{font-size:clamp(16px, 2vw, 22px);font-weight:700}.tt-s{font-size:clamp(9px, 1.1vw, 12px);color:var(--txt2)}
.alert{position:absolute;top:60px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:clamp(11px, 1.5vw, 16px);font-weight:700;text-align:center;white-space:nowrap;z-index:50;opacity:0;transition:opacity .3s;background:#000}
.alert.show{opacity:1}
.flash{position:absolute;inset:0;border:3px solid var(--gn);opacity:0;pointer-events:none;transition:opacity .12s;z-index:45}
.flash.on{opacity:1}
#btnBack{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.9);border:none;border-radius:30px;padding:10px 24px;font-size:clamp(11px, 1.5vw, 14px);font-weight:700;color:#000;cursor:pointer;display:none;z-index:60;white-space:nowrap}
#btnBack.show{display:block}
.modal-bg{position:fixed;inset:0;background:rgba(5,8,13,.95);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-bg.open{display:flex}
.modal{background:var(--bg4);border:1px solid var(--brd2);border-radius:16px;padding:24px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto}
.m-title{font-size:clamp(14px, 1.8vw, 18px);font-weight:700;color:#fff;display:flex;justify-content:space-between;margin-bottom:16px}
.m-x{cursor:pointer;color:var(--txt2);font-size:20px}
</style>
</head>
<body>
<div class="root">

<div class="topbar">
  <div class="tb-logo"><div class="tb-dot"></div>AVIATOR PATTERN DETECTOR</div>
  <div class="tb-mid">
    <button class="btn" onclick="zoomIn()">+</button>
    <button class="btn" onclick="zoomOut()">-</button>
    <button class="btn" onclick="resetView()">↺</button>
  </div>
  <div class="tb-right">
    <button class="btn g" onclick="syncNow()">↻ SINCRONIZAR</button>
    <div class="ws-pill ok" id="wsStatus"><span class="wsd"></span><span id="wsLabel">ON</span></div>
  </div>
</div>

<div class="main">
<div class="chart-col">
  <div class="canvas-wrap" id="cwrap">
    <canvas id="cv"></canvas>
    <div id="pov"></div>
    <div class="flash" id="flash"></div>
    <div class="alert" id="alertBox"></div>
    <div class="tooltip" id="ttBox"><div class="tt-v" id="ttV"></div><div class="tt-s" id="ttS"></div></div>
    <button id="btnBack" onclick="voltarPresente()">◀ VOLTAR</button>
  </div>
  <div class="xbar">
    <span id="xL">—</span><span id="xM">—</span><span id="xR">—</span>
    <input type="range" class="xslider" id="xslider" min="5" max="100" value="40" oninput="CFG.showN=parseInt(this.value);draw()">
    <span id="xNow" style="color:var(--gn);font-size:clamp(10px, 1.2vw, 14px);font-weight:700">—</span>
  </div>
</div>

<div class="data-sb">
  <div class="kv-block">
    <div class="kv"><span class="kk">Último</span><span class="kvv" id="sCot">—</span></div>
    <div class="kv"><span class="kk">Total</span><span class="kvv" id="sTot">0</span></div>
    <div class="kv"><span class="kk">Painel</span><span class="kvv" id="painelInfo">1</span></div>
  </div>
  <div class="pattern-area" id="patternArea">
    <div class="pattern-title">📊 PADRÃO DETECTADO</div>
    <div class="pattern-value" id="patternDetected">—</div>
  </div>
  <div class="sbh">ÚLTIMAS VELAS</div>
  <div class="log-area" id="logArea"></div>
</div>
</div>
</div>

<div class="toolbox">
  <div class="tool-btn" id="tool-cursor" onclick="setTool('cursor')" title="Mover">✋</div>
  <div class="tool-btn" id="tool-line" onclick="setTool('line')" title="Linha">📏</div>
  <div class="tool-sep"></div>
  <div class="tool-btn" id="tool-delete" onclick="deleteSelected()" title="Excluir">🗑️</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════════════════════════
const SERVIDOR_URL = "https://aviator-trader-quadrado.onrender.com";
const PAINEL = 1;

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
const cwrap = document.getElementById('cwrap');

let pts = [];
let pollingInterval = null;
let ultimoTimestamp = 0;
let ultimoAlertaPadrao = 0;

let CFG = { showN: 40 };

let viewOffset = 0, zoomLevel = 1.0, vertOffset = 0, scaleW = 60;
let isPanning = false, panX0 = 0, panOff0 = 0;
let _mx = 0, _my = 0;

let currentTool = 'cursor';
let drawings = [];
let selectedDrawing = null;
let isDrawing = false, drawStart = null;

// ═══════════════════════════════════════════════════════════════════
// SISTEMA DE DETECÇÃO DE PADRÕES (BASEADO NA SUA ANÁLISE)
// ═══════════════════════════════════════════════════════════════════

// Padrões identificados:
// 1. Acúmulo de velas azuis (3-5 velas seguidas entre 1.00x e 1.20x)
// 2. Padrão decrescente progressivo
// 3. Padrão de repetição de valores
// 4. Espelhamento (valores simétricos)
// 5. Minutagem específica (paga em minutos pares/ímpares)
// 6. Ciclos entre velas altas

let historicoPadroes = [];
let sequenciaBaixa = [];

function analisarPadroes() {
  if (pts.length < 15) return null;
  
  const ultimas = pts.slice(-15);
  const valores = ultimas.map(p => p.val);
  const tempos = ultimas.map(p => p.time);
  
  // ========== PADRÃO 1: ACÚMULO DE VELAS AZUIS (ZONA BAIXA) ==========
  // Detectar 3-5 velas consecutivas entre 1.00x e 1.20x
  const velasBaixas = valores.filter(v => v >= 1.00 && v <= 1.20);
  const sequenciaBaixaAtual = [];
  for (let i = valores.length-1; i >= 0; i--) {
    if (valores[i] >= 1.00 && valores[i] <= 1.20) {
      sequenciaBaixaAtual.push(valores[i]);
    } else {
      break;
    }
  }
  
  const acumuloVelas = sequenciaBaixaAtual.length;
  if (acumuloVelas >= 3 && acumuloVelas <= 6) {
    // Verifica se após esse acúmulo geralmente vem uma ROXA ou ROSA
    const previsao = acumuloVelas >= 4 ? 'ROSA (≥10x)' : 'ROXA (≥2x)';
    return {
      tipo: 'ACÚMULO',
      detalhe: `${acumuloVelas} velas consecutivas na zona baixa (1.00x-1.20x)`,
      previsao: previsao,
      forca: Math.min(acumuloVelas * 25, 100)
    };
  }
  
  // ========== PADRÃO 2: PADRÃO DECRESCENTE PROGRESSIVO ==========
  // Velas diminuindo gradualmente: ex: 1.15 → 1.10 → 1.05 → 1.01
  let decrescente = true;
  for (let i = valores.length-4; i < valores.length-1; i++) {
    if (i >= 0 && valores[i] <= valores[i+1]) {
      decrescente = false;
      break;
    }
  }
  if (decrescente && valores.length >= 4) {
    const ultimoValor = valores[valores.length-1];
    if (ultimoValor >= 1.00 && ultimoValor <= 1.30) {
      return {
        tipo: 'DECRESCENTE',
        detalhe: `Sequência decrescente: ${valores.slice(-4).map(v=>v.toFixed(2)).join(' → ')}`,
        previsao: 'ROXA (≥2x) ou ROSA (≥10x)',
        forca: 85
      };
    }
  }
  
  // ========== PADRÃO 3: REPETIÇÃO DE VALORES ==========
  // Valores que se repetem antes de uma vela alta
  const frequencias = {};
  valores.slice(-10).forEach(v => {
    const key = v.toFixed(2);
    frequencias[key] = (frequencias[key] || 0) + 1;
  });
  
  for (const [valor, count] of Object.entries(frequencias)) {
    if (count >= 3 && parseFloat(valor) >= 1.00 && parseFloat(valor) <= 1.50) {
      return {
        tipo: 'REPETIÇÃO',
        detalhe: `Valor ${valor} repetido ${count}x nas últimas velas`,
        previsao: 'ROXA (≥2x)',
        forca: 70
      };
    }
  }
  
  // ========== PADRÃO 4: ESPELHAMENTO ==========
  // Valores simétricos: ex: 1.15 e 1.51, 1.08 e 1.80
  for (let i = valores.length-6; i < valores.length-2; i++) {
    if (i >= 0) {
      const v1 = valores[i];
      const v2 = valores[i+3];
      const espelhado = Math.abs(v1 - (v2 / 10)) < 0.1 || Math.abs((v1 * 10) - v2) < 0.5;
      if (espelhado && v1 >= 1.00 && v1 <= 2.00 && v2 >= 1.00 && v2 <= 20) {
        return {
          tipo: 'ESPELHAMENTO',
          detalhe: `Espelhamento detectado: ${v1.toFixed(2)} → ${v2.toFixed(2)}`,
          previsao: v2 >= 10 ? 'ROSA (≥10x)' : 'ROXA (≥2x)',
          forca: 80
        };
      }
    }
  }
  
  // ========== PADRÃO 5: MINUTAGEM (paga em minutos pares/ímpares) ==========
  if (tempos.length >= 2) {
    const ultimoMinuto = tempos[tempos.length-1].getMinutes();
    const penultimoMinuto = tempos[tempos.length-2].getMinutes();
    const diffMinutos = Math.abs(ultimoMinuto - penultimoMinuto);
    
    // Padrão de minutos: 3, 5, 7, 10 minutos entre velas altas
    if (diffMinutos === 3 || diffMinutos === 5 || diffMinutos === 7 || diffMinutos === 10) {
      const ultimoValor = valores[valores.length-1];
      if (ultimoValor >= 1.00 && ultimoValor <= 1.30) {
        return {
          tipo: 'MINUTAGEM',
          detalhe: `${diffMinutos} minutos desde última vela - padrão de pagamento`,
          previsao: 'ROSA (≥10x)',
          forca: 90
        };
      }
    }
  }
  
  // ========== PADRÃO 6: CICLO ENTRE VELAS ALTAS ==========
  // Encontrar última vela alta (≥10x) e contar velas até agora
  let ultimoIndiceAlto = -1;
  for (let i = pts.length-15; i < pts.length; i++) {
    if (i >= 0 && pts[i] && pts[i].val >= 10) {
      ultimoIndiceAlto = i;
    }
  }
  
  if (ultimoIndiceAlto !== -1) {
    const velasDesdeAlta = pts.length - ultimoIndiceAlto - 1;
    // Ciclos comuns: 10, 15, 20, 25, 30 velas entre altas
    if (velasDesdeAlta === 10 || velasDesdeAlta === 15 || velasDesdeAlta === 20 || velasDesdeAlta === 25 || velasDesdeAlta === 30) {
      return {
        tipo: 'CICLO',
        detalhe: `${velasDesdeAlta} velas desde última ROSA - ciclo detectado`,
        previsao: 'ROSA (≥10x)',
        forca: 85
      };
    }
  }
  
  // ========== PADRÃO 7: PAR/ÍMPAR ==========
  const ultimoValorInt = Math.floor(valores[valores.length-1] * 100);
  const parImpar = ultimoValorInt % 2 === 0 ? 'PAR' : 'ÍMPAR';
  const penultimoParImpar = Math.floor(valores[valores.length-2] * 100) % 2 === 0 ? 'PAR' : 'ÍMPAR';
  
  if (parImpar !== penultimoParImpar && valores[valores.length-1] <= 1.20) {
    return {
      tipo: 'PAR/ÍMPAR',
      detalhe: `Mudou de ${penultimoParImpar} para ${parImpar} - padrão de alternância`,
      previsao: 'ROXA (≥2x)',
      forca: 65
    };
  }
  
  return null;
}

function verificarSinalAntecipado() {
  if (pts.length < 10) return false;
  
  const padrao = analisarPadroes();
  if (!padrao) return false;
  
  const agora = Date.now();
  if (agora - ultimoAlertaPadrao < 60000) return false; // 1 min de cooldown
  
  // Verifica se estamos na zona baixa (última vela)
  const ultimaVela = pts[pts.length-1];
  if (ultimaVela.val >= 1.00 && ultimaVela.val <= 1.30) {
    ultimoAlertaPadrao = agora;
    
    // Marca a vela anterior como ponto de sinal
    if (pts.length >= 2 && !pts[pts.length-2].sinal) {
      pts[pts.length-2].sinal = true;
      pts[pts.length-2].padrao = padrao;
    }
    
    // Mostra alerta
    const alertMsg = `🔔 PADRÃO DETECTADO: ${padrao.tipo}\n📊 ${padrao.detalhe}\n🎯 PREVISÃO: ${padrao.previsao} (força ${padrao.forca}%)`;
    showAlert(alertMsg, '#f59e0b', 8000);
    
    // Atualiza área de padrão
    document.getElementById('patternDetected').innerHTML = `
      <span style="color:#f59e0b">${padrao.tipo}</span><br>
      <small style="color:#4a6e94">${padrao.detalhe}</small><br>
      <strong style="color:#22c55e">→ ${padrao.previsao}</strong> (${padrao.forca}%)
    `;
    
    triggerFlash();
    return true;
  }
  
  return false;
}

// ═══════════════════════════════════════════════════════════════════
// FERRAMENTAS
// ═══════════════════════════════════════════════════════════════════
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`tool-${tool}`).classList.add('active');
  if (tool !== 'move') { selectedDrawing = null; draw(); }
}

function deleteSelected() {
  if (selectedDrawing !== null) {
    drawings.splice(selectedDrawing, 1);
    selectedDrawing = null;
    draw();
    showAlert('✓ Linha removida', '#22c55e', 1000);
  } else {
    showAlert('Clique numa linha para selecionar', '#f59e0b', 1000);
  }
}

function addLine(x1, y1, x2, y2) {
  drawings.push({ type: 'line', x1, y1, x2, y2, color: '#f59e0b' });
  draw();
}

function getDrawingAt(x, y) {
  for (let i = drawings.length-1; i >= 0; i--) {
    const d = drawings[i];
    if (d.type === 'line') {
      const dx = d.x2 - d.x1, dy = d.y2 - d.y1;
      const len = Math.hypot(dx, dy);
      if (len === 0) continue;
      const t = Math.max(0, Math.min(1, ((x - d.x1) * dx + (y - d.y1) * dy) / (len * len)));
      const projX = d.x1 + t * dx, projY = d.y1 + t * dy;
      if (Math.hypot(x - projX, y - projY) < 15) return i;
    }
  }
  return -1;
}

// ═══════════════════════════════════════════════════════════════════
// LOG E UI
// ═══════════════════════════════════════════════════════════════════
function addLog(vela, isSinal = false, padrao = null) {
  const t = vela.time.toLocaleTimeString('pt-BR');
  const v = vela.val;
  let classe, cor;
  if (v >= 10) { classe = 'rosa'; cor = '#f472b6'; }
  else if (v >= 2) { classe = 'roxa'; cor = '#a855f7'; }
  else { classe = 'ciano'; cor = '#06b6d4'; }
  
  const area = document.getElementById('logArea');
  const row = document.createElement('div');
  row.className = 'log-row';
  if (isSinal) row.style.background = 'rgba(245,158,11,0.15)';
  let extra = '';
  if (padrao) extra = `<span class="ltag pattern">${padrao.tipo}</span>`;
  row.innerHTML = `<div class="ldot" style="background:${cor}"></div>
                   <span class="lt">${t}</span>
                   <span class="lv" style="color:${cor}">${v.toFixed(2)}x</span>
                   <span class="ltag ${classe}">${classe.toUpperCase()}</span>
                   ${extra}`;
  area.insertBefore(row, area.firstChild);
  while(area.children.length > 30) area.removeChild(area.lastChild);
}

function atualizarUI() {
  if (!pts.length) return;
  const ult = pts[pts.length-1];
  document.getElementById('sCot').textContent = ult.val.toFixed(2)+'x';
  document.getElementById('sTot').textContent = pts.length;
  document.getElementById('sCot').style.color = ult.val>=10?'#f472b6':ult.val>=2?'#a855f7':'#06b6d4';
}

function showAlert(msg, color, dur=4000) {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.style.cssText = `background:${color}22;border:1px solid ${color};color:${color};white-space:normal;max-width:90%;font-size:11px`;
  el.className = 'alert show';
  setTimeout(() => el.className = 'alert', dur);
}

function triggerFlash() { const f = document.getElementById('flash'); f.className='flash on'; setTimeout(()=>f.className='flash',400); }

// ═══════════════════════════════════════════════════════════════════
// SERVIDOR
// ═══════════════════════════════════════════════════════════════════
async function buscarVelas() {
  try {
    const url = `${SERVIDOR_URL}/api/velas?painel=${PAINEL}&limit=500`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.velas && data.velas.length) {
      pts = [];
      for (const v of data.velas) {
        if (v.rodada === 'TESTE_CONEXAO') continue;
        const mult = parseFloat(v.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          let ts = v.timestamp ? new Date(v.timestamp) : new Date();
          if (isNaN(ts.getTime())) ts = new Date();
          pts.push({ val: mult, time: ts, rodada: v.rodada });
          if (v.ts_recebido > ultimoTimestamp) ultimoTimestamp = v.ts_recebido;
        }
      }
      pts.sort((a,b)=>a.time-b.time);
      atualizarUI();
      document.getElementById('logArea').innerHTML = '';
      pts.slice(-25).reverse().forEach(v => addLog(v));
      draw();
    }
  } catch(e) { console.error(e); }
}

async function buscarNovasVelas() {
  try {
    let url = `${SERVIDOR_URL}/api/velas?painel=${PAINEL}&limit=20`;
    if (ultimoTimestamp > 0) url += `&desde=${ultimoTimestamp}`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.velas && data.velas.length) {
      let novas = 0;
      for (const v of data.velas) {
        if (v.rodada === 'TESTE_CONEXAO') continue;
        const mult = parseFloat(v.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          const existe = pts.some(p => p.rodada === v.rodada);
          if (!existe) {
            let ts = v.timestamp ? new Date(v.timestamp) : new Date();
            if (isNaN(ts.getTime())) ts = new Date();
            pts.push({ val: mult, time: ts, rodada: v.rodada });
            
            // Verifica padrão ANTES de adicionar ao log
            const padrao = analisarPadroes();
            addLog({ val: mult, time: ts }, false, padrao);
            
            // Verifica sinal antecipado
            if (verificarSinalAntecipado()) {
              // Marca a vela anterior no gráfico
              if (pts.length >= 2) {
                pts[pts.length-2].sinal = true;
              }
            }
            novas++;
          }
          if (v.ts_recebido > ultimoTimestamp) ultimoTimestamp = v.ts_recebido;
        }
      }
      if (novas > 0) {
        pts.sort((a,b)=>a.time-b.time);
        atualizarUI();
        draw();
        if (novas > 0) showAlert(`📈 +${novas} vela(s) recebida(s)`, '#22c55e', 1000);
      }
    }
  } catch(e) {}
}

async function syncNow() {
  showAlert('🔄 Sincronizando...', '#60a5fa', 1000);
  await buscarVelas();
}

// ═══════════════════════════════════════════════════════════════════
// GRÁFICO
// ═══════════════════════════════════════════════════════════════════
function getVisN() { return Math.max(5, Math.round(CFG.showN / zoomLevel)); }
function getViewSub() {
  const n = getVisN();
  const end = Math.max(n, pts.length - viewOffset);
  const start = Math.max(0, end - n);
  return pts.slice(start, end);
}
function getScale(sub, W, H) {
  scaleW = Math.max(50, Math.min(100, scaleW));
  const vals = sub.map(p=>p.val);
  if (!vals.length) return { sx:()=>0, sy:()=>0, minV:0.8, maxV:2 };
  const minV = Math.max(0.85, Math.min(...vals) * 0.92);
  const maxV = Math.max(...vals) * 1.1;
  const cW = W - 10 - scaleW, cH = H - 50 - 20;
  const n = sub.length;
  const logMin = Math.log10(minV), logMax = Math.log10(maxV);
  const vsh = (vertOffset / cH) * (logMax - logMin);
  return {
    sx: i => 10 + i * ((cW - 30) / (n-1||1)),
    sy: v => 45 + cH * (1 - (Math.log10(Math.max(v,minV)) - logMin + vsh) / (logMax - logMin||1)),
    minV, maxV
  };
}
function col(v) { return v>=10?'#f472b6':v>=2?'#a855f7':'#06b6d4'; }

function draw() {
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;
  ctx.clearRect(0, 0, W, H);
  const sub = getViewSub();
  if (sub.length < 2) return;
  const { sx, sy, minV, maxV } = getScale(sub, W, H);
  
  ctx.font = `${Math.max(7, Math.min(11, W/80))}px monospace`;
  [1, 2, 5, 10, 20].filter(v=>v>=minV&&v<=maxV*1.05).forEach(v=>{
    const py = sy(v);
    ctx.strokeStyle = v>=10?'rgba(244,114,182,0.08)':v>=2?'rgba(168,85,247,0.06)':'#0c1b2e';
    ctx.beginPath(); ctx.moveTo(8, py); ctx.lineTo(W-scaleW, py); ctx.stroke();
    ctx.fillStyle = v>=10?'#f472b6':v>=2?'#a855f7':'#1e3a58';
    ctx.fillText(v+'x', W-scaleW+3, py+2);
  });
  
  [[1,'#06b6d4'],[2,'#a855f7'],[10,'#f472b6']].forEach(([z,c])=>{
    if(z>=minV&&z<=maxV){ const py=sy(z); ctx.strokeStyle=c+'80'; ctx.lineWidth=1; ctx.setLineDash([5,4]); ctx.beginPath(); ctx.moveTo(8,py); ctx.lineTo(W-scaleW,py); ctx.stroke(); }
  });
  ctx.setLineDash([]);
  
  const yBase = sy(minV);
  for(let i=1;i<sub.length;i++){
    const p0=sub[i-1],p1=sub[i], x0=sx(i-1),y0=sy(p0.val), x1=sx(i),y1=sy(p1.val);
    ctx.beginPath(); ctx.moveTo(x0,yBase); ctx.lineTo(x0,y0);
    const cp1x=x0+(x1-x0)*0.42, cp2x=x0+(x1-x0)*0.58;
    ctx.bezierCurveTo(cp1x,y0,cp2x,y1,x1,y1);
    ctx.lineTo(x1,yBase); ctx.fillStyle = col(Math.max(p0.val,p1.val))+'20'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.bezierCurveTo(cp1x,y0,cp2x,y1,x1,y1);
    ctx.strokeStyle = col(p1.val); ctx.lineWidth = 2; ctx.stroke();
  }
  
  // Bolinhas e marcadores de sinal
  sub.forEach((p,i)=>{
    const x=sx(i), y=sy(p.val), r = p.val>=10?6:p.val>=2?4.5:3;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = col(p.val); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth=1; ctx.stroke();
    
    // Marcador de SINAL (antes da vela rosa/roxa)
    if(p.sinal){
      ctx.beginPath(); ctx.arc(x, y-14, 10, 0, Math.PI*2);
      ctx.fillStyle = '#f59e0b'; ctx.fill();
      ctx.fillStyle = '#000'; ctx.font='bold 8px monospace'; ctx.textAlign='center';
      ctx.fillText('⚠️', x, y-12);
    }
    if(p.padrao){
      ctx.fillStyle = '#f59e0b'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
      ctx.fillText(p.padrao.tipo.substring(0,3), x, y-22);
    }
  });
  
  // Linhas desenhadas
  drawings.forEach((d,idx)=>{
    const sel = idx===selectedDrawing;
    ctx.strokeStyle = sel ? '#22c55e' : d.color;
    ctx.lineWidth = sel ? 2.5 : 1.8;
    if (d.type === 'line') {
      ctx.beginPath(); ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x2,d.y2); ctx.stroke();
      if(sel){
        ctx.fillStyle='#22c55e';
        ctx.beginPath(); ctx.arc(d.x1,d.y1,6,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(d.x2,d.y2,6,0,Math.PI*2); ctx.fill();
      }
    }
  });
  
  if (isDrawing && currentTool === 'line' && drawStart) {
    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth=1.5; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(drawStart.x,drawStart.y); ctx.lineTo(_mx,_my); ctx.stroke();
    ctx.setLineDash([]);
  }
  
  if(sub.length){
    document.getElementById('xL').textContent = sub[0].time.toLocaleTimeString('pt-BR');
    document.getElementById('xM').textContent = sub[Math.floor(sub.length/2)].time.toLocaleTimeString('pt-BR');
    document.getElementById('xR').textContent = sub[sub.length-1].time.toLocaleTimeString('pt-BR');
  }
  document.getElementById('xslider').value = CFG.showN;
}

// ═══════════════════════════════════════════════════════════════════
// EVENTOS
// ═══════════════════════════════════════════════════════════════════
function getPos(e) {
  const rect = cwrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function onTouchStart(e) {
  e.preventDefault();
  const pos = getPos(e);
  if (currentTool === 'cursor') {
    isPanning = true; panX0 = pos.x; panOff0 = viewOffset;
    document.getElementById('pov').style.display = 'block';
  } else if (currentTool === 'line') {
    isDrawing = true; drawStart = { x: pos.x, y: pos.y };
  }
}

function onTouchMove(e) {
  e.preventDefault();
  const pos = getPos(e);
  _mx = pos.x; _my = pos.y;
  if (isPanning && currentTool === 'cursor') {
    const sub = getViewSub();
    if (sub.length >= 2) {
      const step = (canvas.width - 12 - scaleW) / (sub.length - 1 || 1);
      const shift = Math.round((panX0 - pos.x) / step);
      viewOffset = Math.max(0, Math.min(pts.length - getVisN(), panOff0 + shift));
      document.getElementById('btnBack').classList.toggle('show', viewOffset > 2);
      draw();
    }
  } else if (isDrawing && currentTool === 'line') { draw(); }
}

function onTouchEnd(e) {
  if (isDrawing && currentTool === 'line' && drawStart) {
    addLine(drawStart.x, drawStart.y, _mx, _my);
    isDrawing = false; drawStart = null;
  }
  document.getElementById('pov').style.display = 'none';
  isPanning = false;
}

cwrap.addEventListener('touchstart', onTouchStart, { passive: false });
cwrap.addEventListener('touchmove', onTouchMove, { passive: false });
cwrap.addEventListener('touchend', onTouchEnd);
cwrap.addEventListener('mousedown', onTouchStart);
cwrap.addEventListener('mousemove', onTouchMove);
cwrap.addEventListener('mouseup', onTouchEnd);
cwrap.addEventListener('wheel', e => { e.preventDefault(); e.deltaY < 0 ? zoomIn() : zoomOut(); draw(); }, { passive: false });

function zoomIn() { zoomLevel = Math.min(10, zoomLevel * 1.2); draw(); }
function zoomOut() { zoomLevel = Math.max(0.3, zoomLevel / 1.2); draw(); }
function resetView() { zoomLevel = 1.0; viewOffset = 0; vertOffset = 0; draw(); }
function voltarPresente() { viewOffset = 0; document.getElementById('btnBack').classList.remove('show'); draw(); }

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = cwrap.clientWidth, h = cwrap.clientHeight;
  canvas.width = Math.max(200, Math.round(w * dpr));
  canvas.height = Math.max(150, Math.round(h * dpr));
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
new ResizeObserver(resize).observe(cwrap);

setInterval(() => {
  document.getElementById('xNow').textContent = new Date().toLocaleTimeString('pt-BR');
}, 1000);

// INICIALIZAÇÃO
resize();
setTool('cursor');
setTimeout(async () => {
  await buscarVelas();
  pollingInterval = setInterval(() => buscarNovasVelas(), 2000);
  showAlert('🔍 DETECTOR DE PADRÕES ATIVO! Aguardando padrões...', '#f59e0b', 5000);
}, 500);
</script>

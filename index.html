<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aviator v7 - Estável</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#05080f;--bg2:#0a0f1a;--bg3:#0e1522;--bg4:#121d2e;
  --brd:#18273d;--brd2:#203555;
  --txt:#b8d0ec;--txt2:#4a6e94;--txt3:#1e3a58;
  --up:#a855f7;--dn:#06b6d4;--pk:#f43f5e;--gn:#22c55e;--am:#f59e0b;
  --font:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);font-size:11px;color:var(--txt);}
.root{display:flex;flex-direction:column;height:100vh}
.main{display:flex;flex:1;overflow:hidden;min-height:0;flex-direction:column}

.topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;flex-shrink:0;padding:0 8px;gap:6px;overflow-x:auto}
.tb-logo{font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tb-dot{width:8px;height:8px;border-radius:50%;background:var(--gn);animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--gn)}50%{box-shadow:0 0 14px var(--gn)}}
.tb-mid{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tb-right{display:flex;align-items:center;gap:4px;margin-left:auto}
.btn{padding:4px 10px;border-radius:6px;border:1px solid var(--brd2);background:var(--bg3);color:var(--txt2);font-size:9px;font-family:var(--font);cursor:pointer;white-space:nowrap}
.btn:active{transform:scale(0.96)}
.btn.g{border-color:#166534;background:rgba(34,197,94,.1);color:var(--gn)}
.btn.b{border-color:#1e3a5f;background:rgba(96,165,250,.08);color:#60a5fa}
.ws-pill{display:flex;align-items:center;gap:4px;font-size:8px;padding:0 6px}
.ws-pill.ok{color:var(--gn)}.ws-pill.err{color:var(--pk)}
.wsd{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* TOOLBOX */
.toolbox{position:fixed;bottom:20px;right:10px;background:var(--bg2);border:1px solid var(--brd);border-radius:40px;display:flex;flex-direction:row;padding:6px 12px;gap:10px;z-index:100;backdrop-filter:blur(10px)}
.tool-btn{width:40px;height:40px;border-radius:30px;border:1px solid var(--brd2);background:var(--bg3);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px}
.tool-btn:active{transform:scale(0.92)}
.tool-btn.active{border-color:var(--gn);background:rgba(34,197,94,.2);color:var(--gn)}
.tool-sep{width:1px;height:25px;background:var(--brd);margin:0}

.chart-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:200px}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);min-height:200px}
#cv{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#pov{position:absolute;inset:0;z-index:19;display:none}

.xbar{height:34px;background:var(--bg2);border-top:1px solid var(--brd);display:flex;align-items:center;padding:0 8px;gap:6px;font-size:8px;flex-shrink:0}
.xslider{flex:1;height:4px;-webkit-appearance:none;background:var(--brd2);border-radius:2px}
.xslider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gn);cursor:pointer}

.data-sb{background:var(--bg2);border-top:1px solid var(--brd);display:flex;flex-direction:column;max-height:35%;min-height:120px;overflow:hidden;flex-shrink:0}
.sbh{padding:6px 12px;font-size:8px;color:var(--txt3);border-bottom:1px solid var(--brd)}
.kv-block{padding:6px 12px;display:flex;gap:16px;border-bottom:1px solid var(--brd)}
.kv{display:flex;gap:6px}
.kk{font-size:8px;color:var(--txt2)}.kvv{font-size:10px;font-weight:700}
.log-area{flex:1;overflow-y:auto;max-height:120px}
.log-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid #070d15;font-size:9px}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lt{color:var(--txt2);min-width:60px;font-size:8px}
.lv{font-weight:700;min-width:45px}
.ltag{font-size:7px;padding:2px 6px;border-radius:4px;margin-left:auto}
.ltag.rosa{background:rgba(244,114,182,.2);color:#f472b6}
.ltag.roxa{background:rgba(168,85,247,.2);color:#a855f7}
.ltag.ciano{background:rgba(6,182,212,.2);color:#06b6d4}
.ltag.sinal{background:rgba(34,197,94,.3);color:#22c55e}

.tooltip{position:absolute;background:#080f1c;border:1px solid var(--brd2);border-radius:8px;padding:8px 12px;display:none;z-index:60;min-width:100px}
.tt-v{font-size:16px;font-weight:700}.tt-s{font-size:9px;color:var(--txt2)}
.alert{position:absolute;top:50px;left:10px;right:10px;transform:none;padding:10px;border-radius:12px;font-size:11px;text-align:center;white-space:normal;z-index:50;opacity:0;transition:opacity .3s}
.alert.show{opacity:1}
.flash{position:absolute;inset:0;border:3px solid var(--gn);opacity:0;pointer-events:none;transition:opacity .12s;z-index:45}
.flash.on{opacity:1}
#btnBack{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.9);border:none;border-radius:30px;padding:10px 20px;font-size:11px;font-weight:700;color:#000;cursor:pointer;display:none;z-index:60}
#btnBack.show{display:block}

/* MODAL CONFIG */
.modal-bg{position:fixed;inset:0;background:rgba(5,8,13,.95);display:none;align-items:center;justify-content:center;z-index:1000}
.modal-bg.open{display:flex}
.modal{background:var(--bg4);border:1px solid var(--brd2);border-radius:12px;padding:20px;width:90%;max-width:380px;max-height:80vh;overflow-y:auto}
.m-title{font-size:13px;font-weight:700;color:#fff;display:flex;justify-content:space-between;margin-bottom:12px}
.m-x{cursor:pointer;color:var(--txt2);font-size:16px}
.m-group{margin-bottom:12px}
.m-group label{font-size:9px;color:var(--txt2);display:block;margin-bottom:4px}
.m-group input,.m-group select{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--brd2);border-radius:6px;color:var(--txt);font-family:var(--font);font-size:10px}
.m-row{display:flex;gap:8px}
.m-row .m-group{flex:1}
.m-btns{display:flex;gap:8px;margin-top:16px}
.mbtn{padding:8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;flex:1;text-align:center}
.mb-g{background:rgba(34,197,94,.12);border-color:#166534;color:var(--gn)}
.mb-b{background:rgba(96,165,250,.08);border-color:#1e3a5f;color:#60a5fa}
.mb-r{background:rgba(244,63,94,.08);border-color:#9f1239;color:var(--pk)}
.mb-c{background:var(--bg3);border-color:var(--brd);color:var(--txt3)}
.mm-item{background:var(--bg3);border:1px solid var(--brd2);border-radius:8px;padding:10px;margin-bottom:10px}
.mm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer}
.mm-header .mm-nome{font-size:10px;font-weight:700}
.mm-header .mm-toggle{width:32px;height:16px;border-radius:8px;background:var(--brd2);cursor:pointer;position:relative}
.mm-header .mm-toggle.on{background:var(--gn)}
.mm-header .mm-toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s}
.mm-header .mm-toggle.on::after{left:18px}
.mm-detalhes{display:none;margin-top:10px;gap:8px;flex-wrap:wrap}
.mm-detalhes.open{display:flex}
.mm-detalhes input,.mm-detalhes select{padding:5px;background:var(--bg2);border:1px solid var(--brd);border-radius:4px;color:var(--txt);font-size:9px;flex:1;min-width:60px}
</style>
</head>
<body>
<div class="root">

<div class="topbar">
  <div class="tb-logo"><div class="tb-dot"></div>AVIATOR</div>
  <div class="tb-mid">
    <button class="btn" onclick="zoomIn()">+</button>
    <button class="btn" onclick="zoomOut()">-</button>
    <button class="btn" onclick="resetView()">↺</button>
    <button class="btn b" onclick="abrirConfigMM()">⚙ MM</button>
  </div>
  <div class="tb-right">
    <button class="btn g" onclick="syncNow()">↻ SINCRONIZAR</button>
    <div class="ws-pill ok" id="wsStatus"><span class="wsd"></span><span id="wsLabel">ON</span></div>
  </div>
</div>

<div class="main">
<div class="chart-col">
  <div class="canvas-wrap" id="cwrap">
    <canvas id="cv"></canvas>
    <div id="pov"></div>
    <div class="flash" id="flash"></div>
    <div class="alert" id="alertBox"></div>
    <div class="tooltip" id="ttBox"><div class="tt-v" id="ttV"></div><div class="tt-s" id="ttS"></div></div>
    <button id="btnBack" onclick="voltarPresente()">◀ VOLTAR</button>
  </div>
  <div class="xbar">
    <span id="xL">—</span><span id="xM">—</span><span id="xR">—</span>
    <input type="range" class="xslider" id="xslider" min="5" max="80" value="30" oninput="CFG.showN=parseInt(this.value);salvarConfig();draw()">
    <span id="xNow" style="color:var(--gn);font-size:11px">—</span>
  </div>
</div>

<div class="data-sb">
  <div class="kv-block">
    <div class="kv"><span class="kk">Último</span><span class="kvv" id="sCot">—</span></div>
    <div class="kv"><span class="kk">Total</span><span class="kvv" id="sTot">0</span></div>
    <div class="kv"><span class="kk">Painel</span><span class="kvv" id="painelInfo">1</span></div>
  </div>
  <div class="sbh">ÚLTIMAS VELAS</div>
  <div class="log-area" id="logArea"></div>
</div>
</div>
</div>

<div class="toolbox">
  <div class="tool-btn" id="tool-cursor" onclick="setTool('cursor')" title="Mover">✋</div>
  <div class="tool-btn" id="tool-line" onclick="setTool('line')" title="Linha">📏</div>
  <div class="tool-sep"></div>
  <div class="tool-btn" id="tool-delete" onclick="deleteSelected()" title="Excluir">🗑️</div>
</div>

<!-- MODAL CONFIG MM -->
<div class="modal-bg" id="modalMM" onclick="if(event.target===this)fecharModalMM()">
  <div class="modal">
    <div class="m-title">Configurar MMs <span class="m-x" onclick="fecharModalMM()">✕</span></div>
    <div id="mmLista"></div>
    <div class="m-btns">
      <button class="mbtn mb-c" onclick="fecharModalMM()">Fechar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO INICIAL
// ═══════════════════════════════════════════════════════════════════
const SERVIDOR_URL = "https://aviator-trader-quadrado.onrender.com";
const PAINEL = 1;

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
const cwrap = document.getElementById('cwrap');

let pts = [];
let pollingInterval = null;
let ultimoTimestamp = 0;
let ultimoSinalTimestamp = 0;
let sequenciaFraca = 0;

// Configurações padrão
let CFG = {
  showN: 30,
  showMA: true,
  mm1On: true, mm1Per: 9, mm1Cor: '#f59e0b', mm1Lw: 1.8, mm1Curva: 'smooth',
  mm2On: true, mm2Per: 21, mm2Cor: '#06b6d4', mm2Lw: 1.5, mm2Curva: 'linear',
  mm3On: true, mm3Per: 50, mm3Cor: '#22c55e', mm3Lw: 1.3, mm3Curva: 'bezier',
  mm4On: true, mm4Per: 100, mm4Cor: '#ef4444', mm4Lw: 1.2, mm4Curva: 'wavy',
  mm5On: false, mm5Per: 200, mm5Cor: '#eab308', mm5Lw: 1.0, mm5Curva: 'arc',
  mm6On: false, mm6Per: 14, mm6Cor: '#ec4899', mm6Lw: 1.0, mm6Curva: 'spiky'
};

let viewOffset = 0, zoomLevel = 1.0, vertOffset = 0, scaleW = 50;
let isPanning = false, panX0 = 0, panOff0 = 0;
let _mx = 0, _my = 0;

let currentTool = 'cursor';
let drawings = [];
let selectedDrawing = null;
let isDrawing = false, drawStart = null;

// ═══════════════════════════════════════════════════════════════════
// PERSISTÊNCIA
// ═══════════════════════════════════════════════════════════════════
function salvarConfig() {
  try {
    localStorage.setItem('aviator_cfg', JSON.stringify({
      showN: CFG.showN,
      mm1On: CFG.mm1On, mm1Per: CFG.mm1Per, mm1Cor: CFG.mm1Cor, mm1Lw: CFG.mm1Lw, mm1Curva: CFG.mm1Curva,
      mm2On: CFG.mm2On, mm2Per: CFG.mm2Per, mm2Cor: CFG.mm2Cor, mm2Lw: CFG.mm2Lw, mm2Curva: CFG.mm2Curva,
      mm3On: CFG.mm3On, mm3Per: CFG.mm3Per, mm3Cor: CFG.mm3Cor, mm3Lw: CFG.mm3Lw, mm3Curva: CFG.mm3Curva,
      mm4On: CFG.mm4On, mm4Per: CFG.mm4Per, mm4Cor: CFG.mm4Cor, mm4Lw: CFG.mm4Lw, mm4Curva: CFG.mm4Curva,
      mm5On: CFG.mm5On, mm5Per: CFG.mm5Per, mm5Cor: CFG.mm5Cor, mm5Lw: CFG.mm5Lw, mm5Curva: CFG.mm5Curva,
      mm6On: CFG.mm6On, mm6Per: CFG.mm6Per, mm6Cor: CFG.mm6Cor, mm6Lw: CFG.mm6Lw, mm6Curva: CFG.mm6Curva
    }));
  } catch(e) {}
}

function carregarConfig() {
  try {
    const saved = localStorage.getItem('aviator_cfg');
    if (saved) {
      const cfg = JSON.parse(saved);
      Object.assign(CFG, cfg);
      document.getElementById('xslider').value = CFG.showN;
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════
// MODAL CONFIG MM
// ═══════════════════════════════════════════════════════════════════
function abrirConfigMM() {
  const container = document.getElementById('mmLista');
  const mmLista = [
    { id: 1, nome: 'MM1 (Rápida)', cor: CFG.mm1Cor, per: CFG.mm1Per, on: CFG.mm1On, lw: CFG.mm1Lw, curva: CFG.mm1Curva },
    { id: 2, nome: 'MM2 (Média 1)', cor: CFG.mm2Cor, per: CFG.mm2Per, on: CFG.mm2On, lw: CFG.mm2Lw, curva: CFG.mm2Curva },
    { id: 3, nome: 'MM3 (Média 2)', cor: CFG.mm3Cor, per: CFG.mm3Per, on: CFG.mm3On, lw: CFG.mm3Lw, curva: CFG.mm3Curva },
    { id: 4, nome: 'MM4 (Lenta)', cor: CFG.mm4Cor, per: CFG.mm4Per, on: CFG.mm4On, lw: CFG.mm4Lw, curva: CFG.mm4Curva },
    { id: 5, nome: 'MM5 (Extra 1)', cor: CFG.mm5Cor, per: CFG.mm5Per, on: CFG.mm5On, lw: CFG.mm5Lw, curva: CFG.mm5Curva },
    { id: 6, nome: 'MM6 (Extra 2)', cor: CFG.mm6Cor, per: CFG.mm6Per, on: CFG.mm6On, lw: CFG.mm6Lw, curva: CFG.mm6Curva }
  ];
  
  container.innerHTML = mmLista.map(mm => `
    <div class="mm-item" data-id="${mm.id}">
      <div class="mm-header" onclick="toggleMMDetalhes(${mm.id})">
        <span class="mm-nome" style="color:${mm.cor}">${mm.nome} (EMA ${mm.per})</span>
        <div class="mm-toggle ${mm.on ? 'on' : ''}" onclick="event.stopPropagation(); toggleMM(${mm.id})"></div>
      </div>
      <div class="mm-detalhes" id="mmDetalhes${mm.id}">
        <input type="number" id="mmPer${mm.id}" value="${mm.per}" min="2" max="500" placeholder="Período">
        <input type="color" id="mmCor${mm.id}" value="${mm.cor}">
        <input type="number" id="mmLw${mm.id}" value="${mm.lw}" step="0.1" min="0.5" max="3" placeholder="Espessura">
        <select id="mmCurva${mm.id}">
          <option value="linear" ${mm.curva === 'linear' ? 'selected' : ''}>Linear</option>
          <option value="smooth" ${mm.curva === 'smooth' ? 'selected' : ''}>Smooth</option>
          <option value="bezier" ${mm.curva === 'bezier' ? 'selected' : ''}>Bezier</option>
          <option value="wavy" ${mm.curva === 'wavy' ? 'selected' : ''}>Wavy</option>
          <option value="arc" ${mm.curva === 'arc' ? 'selected' : ''}>Arc</option>
          <option value="spiky" ${mm.curva === 'spiky' ? 'selected' : ''}>Spiky</option>
        </select>
        <button class="btn" onclick="aplicarMM(${mm.id})" style="margin-top:4px;width:100%">Aplicar</button>
      </div>
    </div>
  `).join('');
  
  document.getElementById('modalMM').classList.add('open');
}

function toggleMMDetalhes(id) {
  const el = document.getElementById(`mmDetalhes${id}`);
  if (el) el.classList.toggle('open');
}

function toggleMM(id) {
  const on = !CFG[`mm${id}On`];
  CFG[`mm${id}On`] = on;
  const toggle = document.querySelector(`.mm-item[data-id="${id}"] .mm-toggle`);
  if (toggle) toggle.classList.toggle('on', on);
  salvarConfig();
  draw();
}

function aplicarMM(id) {
  const per = parseInt(document.getElementById(`mmPer${id}`).value);
  const cor = document.getElementById(`mmCor${id}`).value;
  const lw = parseFloat(document.getElementById(`mmLw${id}`).value);
  const curva = document.getElementById(`mmCurva${id}`).value;
  
  if (!isNaN(per)) CFG[`mm${id}Per`] = per;
  CFG[`mm${id}Cor`] = cor;
  if (!isNaN(lw)) CFG[`mm${id}Lw`] = lw;
  CFG[`mm${id}Curva`] = curva;
  
  salvarConfig();
  draw();
  showAlert(`MM${id} configurada!`, '#22c55e', 1000);
}

function fecharModalMM() {
  document.getElementById('modalMM').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════════
// FERRAMENTAS
// ═══════════════════════════════════════════════════════════════════
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`tool-${tool}`).classList.add('active');
  if (tool !== 'move') { selectedDrawing = null; draw(); }
}

function deleteSelected() {
  if (selectedDrawing !== null) {
    drawings.splice(selectedDrawing, 1);
    selectedDrawing = null;
    draw();
    showAlert('✓ Linha removida', '#22c55e', 1000);
  } else {
    showAlert('Toque numa linha para selecionar', '#f59e0b', 1000);
  }
}

function addLine(x1, y1, x2, y2) {
  drawings.push({ type: 'line', x1, y1, x2, y2, color: '#f59e0b' });
  draw();
}

function getDrawingAt(x, y) {
  for (let i = drawings.length-1; i >= 0; i--) {
    const d = drawings[i];
    if (d.type === 'line') {
      const dx = d.x2 - d.x1, dy = d.y2 - d.y1;
      const len = Math.hypot(dx, dy);
      if (len === 0) continue;
      const t = Math.max(0, Math.min(1, ((x - d.x1) * dx + (y - d.y1) * dy) / (len * len)));
      const projX = d.x1 + t * dx, projY = d.y1 + t * dy;
      if (Math.hypot(x - projX, y - projY) < 15) return i;
    }
  }
  return -1;
}

// ═══════════════════════════════════════════════════════════════════
// MÉDIAS MÓVEIS
// ═══════════════════════════════════════════════════════════════════
function calcularEMA(dados, periodo, extendFuturo = 10) {
  const k = 2 / (periodo + 1);
  let ema = dados[0];
  const resultado = [ema];
  for (let i = 1; i < dados.length; i++) {
    ema = dados[i] * k + ema * (1 - k);
    resultado.push(ema);
  }
  let ultimo = ema;
  for (let i = 0; i < extendFuturo; i++) {
    ultimo = ultimo * (1 - k);
    resultado.push(ultimo);
  }
  return resultado;
}

const curvaFn = {
  linear: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=1;i<p.length;i++)ctx.lineTo(sx(i),sy(p[i]));ctx.stroke(); },
  smooth: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=0;i<p.length-1;i++){const x1=sx(i),y1=sy(p[i]),x2=sx(i+1),y2=sy(p[i+1]);ctx.bezierCurveTo(x1+(x2-x1)*0.33,y1,x1+(x2-x1)*0.66,y2,x2,y2);}ctx.stroke(); },
  bezier: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=0;i<p.length-1;i++){const x1=sx(i),y1=sy(p[i]),x2=sx(i+1),y2=sy(p[i+1]);ctx.bezierCurveTo(x1+(x2-x1)*0.25,y1-Math.abs(p[i+1]-p[i])*2,x2-(x2-x1)*0.25,y2+Math.abs(p[i+1]-p[i])*2,x2,y2);}ctx.stroke(); },
  wavy: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=0;i<p.length-1;i++){const x1=sx(i),y1=sy(p[i]),x2=sx(i+1),y2=sy(p[i+1]);const mx=(x1+x2)/2,amp=Math.abs(p[i+1]-p[i])*3;ctx.quadraticCurveTo(x1,y1-amp,mx,(y1+y2)/2);ctx.quadraticCurveTo(x2,y2+amp,x2,y2);}ctx.stroke(); },
  arc: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=0;i<p.length-1;i++){const x1=sx(i),y1=sy(p[i]),x2=sx(i+1),y2=sy(p[i+1]);ctx.quadraticCurveTo((x1+x2)/2,Math.min(y1,y2)-15,x2,y2);}ctx.stroke(); },
  spiky: (p,sx,sy) => { if(p.length<2)return; ctx.beginPath();ctx.moveTo(sx(0),sy(p[0]));for(let i=0;i<p.length-1;i++){const x1=sx(i),y1=sy(p[i]),x2=sx(i+1),y2=sy(p[i+1]);const mx=(x1+x2)/2;ctx.lineTo(mx,Math.min(y1,y2)-12);ctx.lineTo(x2,y2);}ctx.stroke(); }
};

// ═══════════════════════════════════════════════════════════════════
// SINAL DE ENTRADA (1 vela antes da ROSA)
// ═══════════════════════════════════════════════════════════════════
function detectarSinalAntecipado() {
  if (pts.length < 5) return false;
  const valores = pts.slice(-5).map(p => p.val);
  const ultimo = valores[valores.length-1];
  const penultimo = valores[valores.length-2];
  const antepenultimo = valores[valores.length-3];
  
  const naZonaAzul = ultimo >= 1.0 && ultimo <= 2.2;
  const enfraquecendo = ultimo < penultimo && penultimo < antepenultimo;
  const timeout = Date.now() - ultimoSinalTimestamp > 60000;
  
  if (naZonaAzul && enfraquecendo && timeout) {
    sequenciaFraca++;
    if (sequenciaFraca >= 2) {
      ultimoSinalTimestamp = Date.now();
      sequenciaFraca = 0;
      return true;
    }
  } else {
    sequenciaFraca = 0;
  }
  return false;
}

function marcarSinal() {
  if (pts.length < 2) return;
  const idx = pts.length - 2;
  if (idx >= 0 && !pts[idx].sinal) {
    pts[idx].sinal = true;
    const t = pts[idx].time.toLocaleTimeString('pt-BR');
    const area = document.getElementById('logArea');
    const row = document.createElement('div');
    row.className = 'log-row';
    row.style.background = 'rgba(34,197,94,0.15)';
    row.innerHTML = `<div class="ldot" style="background:#22c55e"></div><span class="lt">${t}</span><span class="lv" style="color:#22c55e">${pts[idx].val.toFixed(2)}x</span><span class="ltag sinal">⚡ SINAL</span>`;
    area.insertBefore(row, area.firstChild);
  }
}

// ═══════════════════════════════════════════════════════════════════
// LOG E UI
// ═══════════════════════════════════════════════════════════════════
function addLog(vela) {
  const t = vela.time.toLocaleTimeString('pt-BR');
  const v = vela.val;
  let classe, cor;
  if (v >= 10) { classe = 'rosa'; cor = '#f472b6'; }
  else if (v >= 2) { classe = 'roxa'; cor = '#a855f7'; }
  else { classe = 'ciano'; cor = '#06b6d4'; }
  
  const area = document.getElementById('logArea');
  const row = document.createElement('div');
  row.className = 'log-row';
  row.innerHTML = `<div class="ldot" style="background:${cor}"></div><span class="lt">${t}</span><span class="lv" style="color:${cor}">${v.toFixed(2)}x</span><span class="ltag ${classe}">${classe.toUpperCase()}</span>`;
  area.insertBefore(row, area.firstChild);
  while(area.children.length > 30) area.removeChild(area.lastChild);
}

function atualizarUI() {
  if (!pts.length) return;
  const ult = pts[pts.length-1];
  document.getElementById('sCot').textContent = ult.val.toFixed(2)+'x';
  document.getElementById('sTot').textContent = pts.length;
  document.getElementById('sCot').style.color = ult.val>=10?'#f472b6':ult.val>=2?'#a855f7':'#06b6d4';
}

function showAlert(msg, color, dur=2500) {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.style.cssText = `background:${color}22;border:1px solid ${color};color:${color}`;
  el.className = 'alert show';
  setTimeout(() => el.className = 'alert', dur);
}

function triggerFlash() {
  const f = document.getElementById('flash');
  f.className = 'flash on';
  setTimeout(() => f.className = 'flash', 400);
}

// ═══════════════════════════════════════════════════════════════════
// BUSCAR VELAS
// ═══════════════════════════════════════════════════════════════════
async function buscarVelasCompletas() {
  try {
    const url = `${SERVIDOR_URL}/api/velas?painel=${PAINEL}&limit=500`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.velas && data.velas.length) {
      pts = [];
      for (const v of data.velas) {
        if (v.rodada === 'TESTE_CONEXAO') continue;
        const mult = parseFloat(v.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          let ts = v.timestamp ? new Date(v.timestamp) : new Date();
          if (isNaN(ts.getTime())) ts = new Date();
          pts.push({ val: mult, time: ts, rodada: v.rodada });
          if (v.ts_recebido > ultimoTimestamp) ultimoTimestamp = v.ts_recebido;
        }
      }
      pts.sort((a,b)=>a.time-b.time);
      atualizarUI();
      document.getElementById('logArea').innerHTML = '';
      pts.slice(-25).reverse().forEach(v => addLog(v));
      draw();
    }
  } catch(e) { console.error(e); }
}

async function buscarNovasVelas() {
  try {
    let url = `${SERVIDOR_URL}/api/velas?painel=${PAINEL}&limit=20`;
    if (ultimoTimestamp > 0) url += `&desde=${ultimoTimestamp}`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.velas && data.velas.length) {
      let novas = 0;
      for (const v of data.velas) {
        if (v.rodada === 'TESTE_CONEXAO') continue;
        const mult = parseFloat(v.multiplicador);
        if (!isNaN(mult) && mult > 0) {
          const existe = pts.some(p => p.rodada === v.rodada);
          if (!existe) {
            let ts = v.timestamp ? new Date(v.timestamp) : new Date();
            if (isNaN(ts.getTime())) ts = new Date();
            pts.push({ val: mult, time: ts, rodada: v.rodada });
            addLog({ val: mult, time: ts });
            
            if (detectarSinalAntecipado()) {
              marcarSinal();
              showAlert('🔔 SINAL! Próxima vela pode ser ROSA!', '#22c55e', 4000);
              triggerFlash();
            }
            novas++;
          }
          if (v.ts_recebido > ultimoTimestamp) ultimoTimestamp = v.ts_recebido;
        }
      }
      if (novas > 0) {
        pts.sort((a,b)=>a.time-b.time);
        atualizarUI();
        draw();
        if (novas > 0) showAlert(`📈 +${novas} vela(s)`, '#22c55e', 1000);
      }
    }
  } catch(e) {}
}

async function syncNow() {
  showAlert('🔄 Sincronizando...', '#60a5fa', 1000);
  await buscarVelasCompletas();
}

// ═══════════════════════════════════════════════════════════════════
// GRÁFICO
// ═══════════════════════════════════════════════════════════════════
function getVisN() { return Math.max(5, Math.round(CFG.showN / zoomLevel)); }
function getViewSub() {
  const n = getVisN();
  const end = Math.max(n, pts.length - viewOffset);
  const start = Math.max(0, end - n);
  return pts.slice(start, end);
}
function getScale(sub, W, H) {
  scaleW = Math.max(44, scaleW);
  const vals = sub.map(p=>p.val);
  if (!vals.length) return { sx:()=>0, sy:()=>0, minV:0.8, maxV:2 };
  const minV = Math.max(0.85, Math.min(...vals) * 0.92);
  const maxV = Math.max(...vals) * 1.1;
  const cW = W - 10 - scaleW, cH = H - 50 - 20;
  const n = sub.length;
  const logMin = Math.log10(minV), logMax = Math.log10(maxV);
  const vsh = (vertOffset / cH) * (logMax - logMin);
  return {
    sx: i => 10 + i * ((cW - 30) / (n-1||1)),
    sy: v => 45 + cH * (1 - (Math.log10(Math.max(v,minV)) - logMin + vsh) / (logMax - logMin||1)),
    minV, maxV
  };
}
function col(v) { return v>=10?'#f472b6':v>=2?'#a855f7':'#06b6d4'; }

function draw() {
  const W = canvas.width, H = canvas.height;
  if (!W || !H) return;
  ctx.clearRect(0, 0, W, H);
  const sub = getViewSub();
  if (sub.length < 2) return;
  const { sx, sy, minV, maxV } = getScale(sub, W, H);
  
  ctx.font = '7px monospace';
  [1, 2, 5, 10, 20].filter(v=>v>=minV&&v<=maxV*1.05).forEach(v=>{
    const py = sy(v);
    ctx.strokeStyle = v>=10?'rgba(244,114,182,0.08)':v>=2?'rgba(168,85,247,0.06)':'#0c1b2e';
    ctx.beginPath(); ctx.moveTo(8, py); ctx.lineTo(W-scaleW, py); ctx.stroke();
    ctx.fillStyle = v>=10?'#f472b6':v>=2?'#a855f7':'#1e3a58';
    ctx.fillText(v+'x', W-scaleW+3, py+2);
  });
  
  [[1,'#06b6d4'],[2,'#a855f7'],[10,'#f472b6']].forEach(([z,c])=>{
    if(z>=minV&&z<=maxV){ const py=sy(z); ctx.strokeStyle=c+'80'; ctx.lineWidth=1; ctx.setLineDash([5,4]); ctx.beginPath(); ctx.moveTo(8,py); ctx.lineTo(W-scaleW,py); ctx.stroke(); }
  });
  ctx.setLineDash([]);
  
  const yBase = sy(minV);
  for(let i=1;i<sub.length;i++){
    const p0=sub[i-1],p1=sub[i], x0=sx(i-1),y0=sy(p0.val), x1=sx(i),y1=sy(p1.val);
    ctx.beginPath(); ctx.moveTo(x0,yBase); ctx.lineTo(x0,y0);
    const cp1x=x0+(x1-x0)*0.42, cp2x=x0+(x1-x0)*0.58;
    ctx.bezierCurveTo(cp1x,y0,cp2x,y1,x1,y1);
    ctx.lineTo(x1,yBase); ctx.fillStyle = col(Math.max(p0.val,p1.val))+'20'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.bezierCurveTo(cp1x,y0,cp2x,y1,x1,y1);
    ctx.strokeStyle = col(p1.val); ctx.lineWidth = 2; ctx.stroke();
  }
  
  // Médias móveis
  if (CFG.showMA && pts.length >= 2) {
    const valores = pts.map(p=>p.val);
    const subStart = Math.max(0, pts.length - viewOffset - sub.length);
    for (let i=1; i<=6; i++) {
      if (!CFG[`mm${i}On`] || pts.length < CFG[`mm${i}Per`]) continue;
      const ema = calcularEMA(valores, CFG[`mm${i}Per`], 10);
      const slice = ema.slice(subStart, subStart + sub.length + 15);
      if (slice.length < 2) continue;
      ctx.strokeStyle = CFG[`mm${i}Cor`];
      ctx.lineWidth = CFG[`mm${i}Lw`];
      ctx.setLineDash(i>=3?[5,3]:[]);
      (curvaFn[CFG[`mm${i}Curva`]] || curvaFn.linear)(slice, sx, sy);
    }
    ctx.setLineDash([]);
  }
  
  // Bolinhas e sinal
  sub.forEach((p,i)=>{
    const x=sx(i), y=sy(p.val), r = p.val>=10?6:p.val>=2?4.5:3;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = col(p.val); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth=1; ctx.stroke();
    
    if(p.sinal){
      ctx.beginPath(); ctx.arc(x, y-12, 8, 0, Math.PI*2);
      ctx.fillStyle = '#22c55e'; ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
      ctx.fillText('⚡', x, y-11);
    }
  });
  
  // Linhas desenhadas
  drawings.forEach((d,idx)=>{
    const sel = idx===selectedDrawing;
    ctx.strokeStyle = sel ? '#22c55e' : d.color;
    ctx.lineWidth = sel ? 2.5 : 1.8;
    if (d.type === 'line') {
      ctx.beginPath(); ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x2,d.y2); ctx.stroke();
      if(sel){
        ctx.fillStyle='#22c55e';
        ctx.beginPath(); ctx.arc(d.x1,d.y1,6,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(d.x2,d.y2,6,0,Math.PI*2); ctx.fill();
      }
    }
  });
  
  if (isDrawing && currentTool === 'line' && drawStart) {
    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth=1.5; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(drawStart.x,drawStart.y); ctx.lineTo(_mx,_my); ctx.stroke();
    ctx.setLineDash([]);
  }
  
  if(sub.length){
    document.getElementById('xL').textContent = sub[0].time.toLocaleTimeString('pt-BR');
    document.getElementById('xM').textContent = sub[Math.floor(sub.length/2)].time.toLocaleTimeString('pt-BR');
    document.getElementById('xR').textContent = sub[sub.length-1].time.toLocaleTimeString('pt-BR');
  }
  document.getElementById('xslider').value = CFG.showN;
}

// ═══════════════════════════════════════════════════════════════════
// EVENTOS
// ═══════════════════════════════════════════════════════════════════
function getPos(e) {
  const rect = cwrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function onTouchStart(e) {
  e.preventDefault();
  const pos = getPos(e);
  if (currentTool === 'cursor') {
    isPanning = true; panX0 = pos.x; panOff0 = viewOffset;
    document.getElementById('pov').style.display = 'block';
  } else if (currentTool === 'line') {
    isDrawing = true; drawStart = { x: pos.x, y: pos.y };
  }
}

function onTouchMove(e) {
  e.preventDefault();
  const pos = getPos(e);
  _mx = pos.x; _my = pos.y;
  if (isPanning && currentTool === 'cursor') {
    const sub = getViewSub();
    if (sub.length >= 2) {
      const step = (canvas.width - 12 - scaleW) / (sub.length - 1 || 1);
      const shift = Math.round((panX0 - pos.x) / step);
      viewOffset = Math.max(0, Math.min(pts.length - getVisN(), panOff0 + shift));
      document.getElementById('btnBack').classList.toggle('show', viewOffset > 2);
      draw();
    }
  } else if (isDrawing && currentTool === 'line') { draw(); }
}

function onTouchEnd(e) {
  if (isDrawing && currentTool === 'line' && drawStart) {
    addLine(drawStart.x, drawStart.y, _mx, _my);
    isDrawing = false; drawStart = null;
  }
  document.getElementById('pov').style.display = 'none';
  isPanning = false;
}

cwrap.addEventListener('touchstart', onTouchStart, { passive: false });
cwrap.addEventListener('touchmove', onTouchMove, { passive: false });
cwrap.addEventListener('touchend', onTouchEnd);
cwrap.addEventListener('mousedown', onTouchStart);
cwrap.addEventListener('mousemove', onTouchMove);
cwrap.addEventListener('mouseup', onTouchEnd);
cwrap.addEventListener('wheel', e => { e.preventDefault(); e.deltaY < 0 ? zoomIn() : zoomOut(); draw(); }, { passive: false });

function zoomIn() { zoomLevel = Math.min(10, zoomLevel * 1.2); draw(); }
function zoomOut() { zoomLevel = Math.max(0.3, zoomLevel / 1.2); draw(); }
function resetView() { zoomLevel = 1.0; viewOffset = 0; vertOffset = 0; draw(); }
function voltarPresente() { viewOffset = 0; document.getElementById('btnBack').classList.remove('show'); draw(); }

function resize() {
  const dpr = window.devicePixelRatio || 2;
  const w = cwrap.clientWidth, h = cwrap.clientHeight;
  canvas.width = Math.max(100, Math.round(w * dpr));
  canvas.height = Math.max(100, Math.round(h * dpr));
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
new ResizeObserver(resize).observe(cwrap);

setInterval(() => {
  document.getElementById('xNow').textContent = new Date().toLocaleTimeString('pt-BR');
}, 1000);

// INICIALIZAÇÃO
carregarConfig();
resize();
setTool('cursor');
setTimeout(async () => {
  await buscarVelasCompletas();
  pollingInterval = setInterval(() => buscarNovasVelas(), 2000);
  showAlert('🟢 Painel estável! Clique em ⚙ MM para configurar', '#22c55e', 4000);
}, 500);
</script>
